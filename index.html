<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时评雷达 · 事实驱动版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --ink: #1a1208; --paper: #f5f0e8; --cream: #ede8dc; --accent: #c8371a; --gold: #b8860b; --muted: #7a6f5e; --border: #c9bfaa; --green: #1a7a4a; --blue: #1a3a7a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--paper); color: var(--ink); font-family: 'Noto Serif SC', serif; min-height: 100vh; }
  body::before { content:''; position:fixed; inset:0; background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,160,120,0.12) 27px, rgba(180,160,120,0.12) 28px); pointer-events:none; z-index:0; }
  .masthead { border-bottom: 3px double var(--ink); padding: 18px 40px 14px; display: flex; align-items: baseline; justify-content: space-between; background: var(--paper); z-index:1; position:relative; }
  .masthead-title { font-family: 'Playfair Display', serif; font-size: 2.6rem; font-weight:900; letter-spacing:-1px; }
  .toolbar { padding: 12px 40px; border-bottom: 1px solid var(--border); background: var(--cream); display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:10; }
  .btn-fetch { font-family:'JetBrains Mono', monospace; font-size:0.75rem; font-weight:600; background: var(--ink); color: var(--paper); border:none; padding:8px 20px; cursor:pointer; }
  .layout { display:grid; grid-template-columns: 1fr 340px; min-height: 80vh; position:relative; z-index:1; }
  .main-col { padding: 28px 36px; border-right:1px solid var(--border); }
  .side-col { padding:24px 24px; }
  .topic-card { padding: 20px 0; border-bottom: 1px solid rgba(180,160,120,0.3); display:grid; grid-template-columns: 36px 1fr; gap:12px; }
  .card-rank { font-family:'Playfair Display', serif; font-size:1.4rem; font-weight:900; color:var(--border); }
  .card-title a { color:inherit; text-decoration:none; font-weight:700; font-size:1.1rem; }
  .free-write-section { border-top:3px double var(--ink); padding:40px 36px; background:var(--cream); }
  .draft-overlay { position:fixed; inset:0; background:rgba(26,18,8,0.95); z-index:100; display:none; align-items:center; justify-content:center; padding:24px; }
  .draft-box { background:var(--paper); width:100%; max-width:850px; max-height:92vh; display:flex; flex-direction:column; border:2px solid var(--ink); }
  .draft-body { padding:30px; overflow-y:auto; flex:1; font-size:1.05rem; line-height:2.2; white-space:pre-wrap; }
  .factcheck-report { padding:20px; border-top:1px solid var(--border); background:var(--cream); font-size:0.8rem; max-height:250px; overflow-y:auto; }
  .fact-link { color:var(--blue); text-decoration:underline; display:block; margin-top:4px; font-size:0.7rem; }
  .write-num { font-family:'JetBrains Mono', monospace; font-size:0.8rem; border: 1px solid var(--border); padding:10px; background:var(--paper); }
  .field-label { font-family:'JetBrains Mono', monospace; font-size:0.65rem; color:var(--muted); margin-bottom:5px; display:block; }
</style>
</head>
<body>

<div class="masthead">
  <div><div class="masthead-title">时评<span>雷达</span></div><div class="masthead-sub">NEWSROOM INTELLIGENCE · FACTS FIRST</div></div>
  <div style="font-family:monospace; font-size:0.7rem;" id="clockDisplay">--:--:--</div>
</div>

<div class="toolbar">
  <button class="btn-fetch" id="btnFetch" onclick="startAnalysis()">▶ 抓取并分析</button>
  <div style="display:flex;gap:6px;">
    <button class="cat-btn" id="providerClaude" onclick="switchProvider('claude')">Claude</button>
    <button class="cat-btn" id="providerDeepseek" onclick="switchProvider('deepseek')">DeepSeek</button>
    <button class="cat-btn" id="providerGemini" onclick="switchProvider('gemini')">Gemini</button>
  </div>
  <div class="key-input-wrap">
    <input class="write-num" id="claudeKey" type="password" style="width:250px" placeholder="API Key..." oninput="saveKey(this.value)">
  </div>
  <div class="status-bar" id="statusBar">就绪</div>
</div>

<div class="layout">
  <div class="main-col">
    <div class="section-header"><div class="section-title">今日推荐选题</div><div id="resultCount" style="font-family:monospace; font-size:0.7rem;">--</div></div>
    <div id="resultList"></div>
  </div>
  <div class="side-col">
    <div class="side-title" style="font-size:0.7rem; letter-spacing:1px; text-transform:uppercase">实时热榜预览</div>
    <div class="raw-list" id="rawList"></div>
  </div>
</div>

<div class="free-write-section">
    <div class="section-title">自由创作中心</div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">
        <div style="grid-column: 1/-1">
            <label class="field-label">选题标题</label>
            <input class="write-num" id="freeTitle" style="width:100%;" placeholder="在此输入你想探讨的话题...">
        </div>
        <div>
            <label class="field-label">文章模式</label>
            <select id="freeStyle" class="write-num" style="width:100%">
                <option value="fact_first">新闻实录 (事实优先/70%叙事)</option>
                <option value="pipeline">硬核六段式 (社会评论)</option>
                <option value="oped">深度 Op-Ed (反共识视角)</option>
            </select>
        </div>
        <div>
            <label class="field-label">写作立场</label>
            <select id="freePersona" class="write-num" style="width:100%">
                <option value="reporter">冷峻记者 (客观叙事)</option>
                <option value="editor">主流情绪</option>
                <option value="scholar">中立学者</option>
            </select>
        </div>
        <div style="grid-column: 1/-1">
            <label class="field-label">核心观点 / 已知细节</label>
            <textarea id="freeAngle" class="write-num" style="width:100%; height:80px; font-family:serif;" placeholder="描述你的观点，或输入你已知的关键细节..."></textarea>
        </div>
    </div>
    <div style="text-align:right; margin-top:20px;"><button class="btn-fetch" onclick="submitFreeWrite()">▶ 开始深度创作</button></div>
</div>

<div id="writeDialog" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; align-items:center; justify-content:center;">
    <div style="background:var(--paper); width:90%; max-width:550px; padding:35px; border:2px solid var(--ink);">
        <div id="dialogTitle" style="font-weight:900; font-size:1.2rem; margin-bottom:20px;"></div>
        <div id="dialogAngles" style="margin-bottom:20px; background:var(--cream); padding:15px; border:1px solid var(--border)"></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:25px;">
            <select id="diagStyle" class="write-num">
                <option value="fact_first">新闻实录 (事实优先)</option>
                <option value="pipeline">六段式结构</option>
                <option value="oped">深度 Op-Ed</option>
            </select>
            <select id="diagPersona" class="write-num">
                <option value="reporter">冷峻记者</option>
                <option value="editor">主流情绪</option>
                <option value="scholar">中立学者</option>
            </select>
        </div>
        <div style="text-align:right">
            <button onclick="closeWriteDialog()" style="background:none; border:none; margin-right:15px; cursor:pointer; font-family:monospace">CANCEL</button>
            <button class="btn-fetch" onclick="submitFromDialog()">START WRITING</button>
        </div>
    </div>
</div>

<div class="draft-overlay" id="draftOverlay">
    <div class="draft-box">
        <div class="masthead" style="padding:15px 25px"><div id="draftTitle" style="font-weight:700"></div><button onclick="closeDraft()" style="cursor:pointer">✕</button></div>
        <div class="draft-body" id="draftBody"></div>
        <div class="factcheck-report" id="factcheckReport" style="display:none"><div id="factcheckItems"></div></div>
        <div style="padding:15px; text-align:right; background:var(--cream); border-top:1px solid var(--border)">
            <button id="btnFactcheck" class="cat-btn" onclick="startFactcheck()" disabled>🔍 核查事实并追溯信源</button>
            <button class="btn-fetch" onclick="copyDraft()" style="padding:6px 15px; margin-left:10px;">复制纯文本</button>
        </div>
    </div>
</div>

<script>
window._topicData = {};

function updateClock() { document.getElementById('clockDisplay').textContent = new Date().toLocaleString('zh-CN', {hour12:false}); }
setInterval(updateClock, 1000); updateClock();

function getProvider() { return localStorage.getItem('ai_provider') || 'claude'; }
function saveKey(v) { localStorage.setItem(getProvider() + '_key', v); }

function switchProvider(p) {
    localStorage.setItem('ai_provider', p);
    document.querySelectorAll('.toolbar .cat-btn').forEach(b => b.classList.toggle('active', b.id.toLowerCase() === 'provider' + p));
    document.getElementById('claudeKey').value = localStorage.getItem(p + '_key') || '';
}

async function callClaude(apiKey, prompt, maxTokens) {
    const provider = getProvider();
    let model = 'claude-3-5-sonnet-latest';
    if (provider === 'deepseek') model = 'deepseek-chat';
    if (provider === 'gemini') model = 'gemini-1.5-flash-latest';

    const res = await fetch('/api/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apiKey, provider, payload: { model, max_tokens: maxTokens || 4000, messages: [{ role: 'user', content: prompt }] } })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || '请求失败');
    return data.content?.[0]?.text || '';
}

async function startAnalysis() {
    const key = localStorage.getItem(getProvider() + '_key');
    if (!key) return alert('请填入 Key');
    document.getElementById('statusBar').textContent = '深度扫描热榜中...';
    try {
        const SOURCES = [ {key:'toutiao',name:'今日头条'}, {key:'thepaper',name:'澎湃新闻'}, {key:'huxiu',name:'虎嗅'}, {key:'36kr',name:'36氪'}, {key:'sina-news',name:'新浪新闻'}, {key:'netease-news',name:'网易新闻'} ];
        const results = await Promise.all(SOURCES.map(s => fetch(`https://daily-hot-api-vercel-mu.vercel.app/${s.key}`).then(r => r.json()).catch(()=>({data:[]}))));
        const allItems = results.flatMap((r, i) => (r.data || []).map(item => ({...item, _sourceName: SOURCES[i].name})));
        
        const groups = {};
        allItems.forEach(it => { if(!groups[it._sourceName]) groups[it._sourceName]=[]; groups[it._sourceName].push(it); });
        document.getElementById('rawList').innerHTML = Object.entries(groups).map(([name, list]) => `<div class="raw-platform-header">${name}</div>` + list.slice(0,6).map((it, i) => `<div class="raw-item"><span>${i+1}</span><a href="${it.url}" target="_blank" style="color:inherit; text-decoration:none; margin-left:10px">${it.title}</a></div>`).join('')).join('');
        
        const titles = allItems.slice(0, 80).map((it, i) => `${i+1}. [${it._sourceName}] ${it.title}`).join('\n');
        const text = await callClaude(key, `请筛选20个值得写深度评论的话题。返回JSON格式: {"selected": [{"index":序号, "angles":["视角1", "视角2"]}]}\n列表：\n${titles}`, 4000);
        const analysis = JSON.parse(text.replace(/```json|```/g, '').trim());
        
        document.getElementById('resultList').innerHTML = analysis.selected.map((s, i) => {
            const item = allItems[s.index-1];
            if(!item) return '';
            window._topicData[i] = { title: item.title, angles: s.angles };
            return `<div class="topic-card"><div class="card-rank">${i+1}</div><div class="card-body"><div class="card-title"><a href="${item.url}" target="_blank">${item.title}</a></div><div class="card-angles">${s.angles.map(a => `<div class="angle-item"><span class="angle-num">视角</span>${a}</div>`).join('')}</div><button onclick="openWriteDialog(${i})" style="margin-top:15px; cursor:pointer; padding:4px 12px; border:1px solid var(--gold); color:var(--gold); background:transparent">✍ 写这篇</button></div></div>`;
        }).join('');
        document.getElementById('statusBar').textContent = '就绪';
        document.getElementById('resultCount').textContent = analysis.selected.length + ' SELECTIONS';
    } catch(e) { alert(e.message); }
}

function openWriteDialog(idx) {
    const data = window._topicData[idx];
    window._currentIdx = idx;
    document.getElementById('dialogTitle').textContent = data.title;
    document.getElementById('dialogAngles').innerHTML = data.angles.map((a, i) => `<label style="display:block; margin-bottom:8px;"><input type="radio" name="angle" value="${i}" ${i===0?'checked':''}> ${a}</label>`).join('');
    document.getElementById('writeDialog').style.display = 'flex';
}
function closeWriteDialog() { document.getElementById('writeDialog').style.display = 'none'; }

async function submitFromDialog() {
    const data = window._topicData[window._currentIdx];
    const angle = data.angles[document.querySelector('input[name="angle"]:checked').value];
    closeWriteDialog();
    executeWorkflow(data.title, angle, document.getElementById('diagStyle').value, document.getElementById('diagPersona').value);
}

function submitFreeWrite() {
    const t = document.getElementById('freeTitle').value; const a = document.getElementById('freeAngle').value;
    if(!t || !a) return alert('请填入信息');
    executeWorkflow(t, a, document.getElementById('freeStyle').value, document.getElementById('freePersona').value);
}

async function executeWorkflow(title, angle, style, persona) {
    const overlay = document.getElementById('draftOverlay');
    overlay.classList.add('open');
    const body = document.getElementById('draftBody');
    body.innerHTML = '<div style="text-align:center; padding:50px; font-family:monospace;">PHASE 1: 正在检索 5W1H 事实细节与背景素材...</div>';
    
    try {
        const key = localStorage.getItem(getProvider() + '_key');
        
        // 核心修改 1：研究阶段强制细节化
        const researchPrompt = `你是一位深度调查记者。针对选题【${title}】，请提取最硬核的新闻细节。
        要求：
        1. 5W1H清单：时间线、具体地点、涉及人物、确切数字、政策名称。
        2. 场景还原：提取具有现场感的细节或当事人的具体行为。
        3. 对标背景：历史上类似的案例或相关的行业常识。
        只给干货，严禁抒情，严禁分析，字数500字左右。`;
        
        const research = await callClaude(key, researchPrompt, 1500);
        body.innerHTML = '<div style="text-align:center; padding:50px; font-family:monospace; color:var(--green)">PHASE 2: 事实已对齐，正在进行实录型创作...</div>';
        
        // 核心修改 2：写稿提示词权重调整
        const personasDesc = {
            reporter: "冷峻的特稿记者 (使用白描手法，拒绝情绪化词汇)",
            editor: "主流情绪观察员",
            scholar: "中立学者 (强调结构化因果)"
        };
        
        let prompt = `你是【${personasDesc[persona]}】。基于以下【深度素材】写一篇1200字评论。
【深度素材】${research}
【选题】${title} | 【视角】${angle}

【写作核心原则】：
1. 叙事驱动：全文 70% 篇幅必须用于复述和串联【深度素材】中的新闻细节与事实。
2. 冷峻笔触：模仿《纽约客》风格。禁止使用“令人痛心”、“加强监管”、“我们要...”等公文套话。
3. 点到为止：分析应无缝嵌入叙事，或仅在文末用 200 字左右点睛。
4. 禁用符号：禁止使用 markdown 加粗（**）。`;

        if(style === 'fact_first') {
            prompt += "\n模式：新闻实录。请将事实描述占比提升至 80%，以白描手法还原事件真相。";
        } else if(style === 'pipeline') {
            prompt += "\n结构：特写破题、事实拆解、利益关联、金句定调、溯源追问、升华结尾。";
        } else if(style === 'oped') {
            prompt = `写一篇深度 Op-Ed。反共识视角、智识压制、流体思维。必须基于事实进行降维打击。资料：${research}`;
        }

        const raw = await callClaude(key, prompt, 4000);
        const cleaned = raw.replace(/\*\*/g, '');
        body.textContent = cleaned;
        document.getElementById('draftTitle').textContent = title;
        document.getElementById('btnFactcheck').disabled = false;
    } catch(e) { body.innerHTML = `生成失败: ${e.message}`; }
}

async function startFactcheck() {
    const itemsEl = document.getElementById('factcheckItems');
    document.getElementById('factcheckReport').style.display = 'block';
    itemsEl.textContent = '正在核查事实并搜索信源...';
    try {
        const key = localStorage.getItem(getProvider() + '_key');
        const report = await callClaude(key, `核查文章事实。必须提供新闻标题和参考链接。格式：ERROR|原文|事实|原因|标题|链接 或 OK|事实|标题|链接。内容：${document.getElementById('draftBody').textContent}`, 2500);
        itemsEl.innerHTML = report.split('\n').filter(l=>l.trim()).map(line => {
            const p = line.split('|');
            if(line.startsWith('ERROR|') && p.length >= 6) return `<div class="fact-item"><div class="fact-original">✗ ${p[1]}</div><div class="fact-corrected">✓ ${p[2]}</div><a class="fact-link" href="${p[5]}" target="_blank">来源：${p[4]}</a></div>`;
            if(line.startsWith('OK|') && p.length >= 4) return `<div class="fact-ok">✓ ${p[1]} <a class="fact-link" href="${p[3]}" target="_blank" style="display:inline; margin-left:10px">验证：${p[2]}</a></div>`;
            return '';
        }).join('');
    } catch(e) { itemsEl.textContent = '核查异常'; }
}

function closeDraft() { document.getElementById('draftOverlay').classList.remove('open'); }
function copyDraft() { navigator.clipboard.writeText(document.getElementById('draftBody').textContent); alert('已复制纯文本全文'); }
window.onload = () => switchProvider(getProvider());
</script>
</body>
</html>
