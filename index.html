<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时评雷达 · RADAR、</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:     #1a1208;
    --paper:   #f5f0e8;
    --cream:   #ede8dc;
    --accent:  #c8371a;
    --gold:    #b8860b;
    --muted:   #7a6f5e;
    --border:  #c9bfaa;
    --green:   #1a7a4a;
    --blue:    #1a3a7a;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
  }

  body::before {
    content:'';
    position:fixed; inset:0;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 27px,
      rgba(180,160,120,0.12) 27px, rgba(180,160,120,0.12) 28px
    );
    pointer-events:none; z-index:0;
  }

  /* ── MASTHEAD ── */
  .masthead {
    border-bottom: 3px double var(--ink);
    padding: 18px 40px 14px;
    display: flex; align-items: baseline; justify-content: space-between;
    background: var(--paper); z-index:1; position:relative;
  }
  .masthead-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem; font-weight:900; letter-spacing:-1px; line-height:1;
  }
  .masthead-title span { color: var(--accent); }
  .masthead-meta {
    text-align:right;
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem; color:var(--muted); line-height:1.7;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    padding: 12px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
    display:flex; align-items:center; gap:16px;
    position:sticky; top:0; z-index:10;
  }
  .btn-fetch {
    font-family:'JetBrains Mono', monospace;
    font-size:0.75rem; font-weight:600; letter-spacing:1px;
    background: var(--ink); color: var(--paper);
    border:none; padding:8px 20px; cursor:pointer;
    transition: background 0.15s;
  }
  .btn-fetch:hover { background: var(--accent); }
  .btn-fetch:disabled { background: var(--border); cursor:not-allowed; }

  .key-input-wrap {
    display:flex; align-items:center; gap:8px; flex:1; max-width:420px;
  }
  .key-input-wrap label {
    font-family:'JetBrains Mono', monospace;
    font-size:0.65rem; color:var(--muted); white-space:nowrap; letter-spacing:0.5px;
  }
  .key-input {
    font-family:'JetBrains Mono', monospace; font-size:0.7rem;
    border: 1px solid var(--border); background: var(--paper);
    padding:6px 10px; color:var(--ink); flex:1; outline:none;
  }
  .key-input:focus { border-color: var(--gold); }

  .status-bar {
    font-family:'JetBrains Mono', monospace;
    font-size:0.65rem; color:var(--muted); margin-left:auto;
  }
  .status-bar.running { color: var(--gold); }
  .status-bar.done    { color: var(--green); }
  .status-bar.error   { color: var(--accent); }

  /* ── LAYOUT ── */
  .layout {
    display:grid; grid-template-columns: 1fr 340px;
    gap:0; position:relative; z-index:1;
    min-height: calc(100vh - 120px);
  }
  .main-col { padding: 28px 36px; border-right:1px solid var(--border); }
  .side-col { padding:24px 24px; }

  .section-header {
    display:flex; align-items:baseline; justify-content:space-between;
    border-bottom: 2px solid var(--ink); padding-bottom:8px; margin-bottom:20px;
  }
  .section-title { font-family:'Playfair Display', serif; font-size:1.1rem; font-weight:700; letter-spacing:0.5px; }

  /* ── CARD ── */
  .card-list { display:flex; flex-direction:column; gap:0; }
  .topic-card { padding: 16px 0; border-bottom: 1px solid rgba(180,160,120,0.3); display:grid; grid-template-columns: 36px 1fr; gap:12px; animation: fadeIn 0.3s ease both; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .card-rank { font-family:'Playfair Display', serif; font-size:1.4rem; font-weight:900; color:var(--border); line-height:1; }
  .card-title { font-size:1rem; font-weight:600; line-height:1.5; margin-bottom:6px; color:var(--ink); }
  .card-title a { color:inherit; text-decoration:none; border-bottom:1px solid transparent; }
  .card-title a:hover { color:var(--accent); border-bottom-color:var(--accent); }
  .card-angles { display:flex; flex-direction:column; gap:5px; }
  .angle-item { display:flex; align-items:flex-start; gap:8px; font-size:0.8rem; line-height:1.5; color:var(--ink); }
  .angle-num { font-family:'JetBrains Mono', monospace; font-size:0.6rem; color:var(--paper); background: var(--muted); padding:1px 5px; margin-top:3px; }

  /* ── SIDEBAR ── */
  .raw-platform-header { font-family:'JetBrains Mono', monospace; font-size:0.6rem; font-weight:600; letter-spacing:1px; color:var(--paper); background:var(--ink); padding:3px 8px; margin:10px 0 4px; }
  .raw-item { display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid rgba(180,160,120,0.2); font-size:0.8rem; line-height:1.4; }
  .raw-rank { font-family:'JetBrains Mono', monospace; font-size:0.62rem; color:var(--border); width:18px; }
  .raw-title { color:var(--ink); flex:1; text-decoration:none; }
  .raw-title:hover { color:var(--accent); text-decoration:underline; }

  /* ── DRAFT OVERLAY ── */
  .draft-overlay { position:fixed; inset:0; background:rgba(26,18,8,0.85); z-index:100; display:none; align-items:center; justify-content:center; padding:24px; }
  .draft-overlay.open { display:flex; }
  .draft-box { background:var(--paper); width:100%; max-width:760px; max-height:90vh; display:flex; flex-direction:column; border:2px solid var(--ink); }
  .draft-header { padding:14px 20px; border-bottom:2px solid var(--ink); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .factcheck-report { padding:12px 20px; border-top:1px solid var(--border); background:var(--cream); font-size:0.78rem; display:none; max-height:220px; overflow-y:auto; flex-shrink:0; }
  .factcheck-report.open { display:block; }
  .fact-item { margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid rgba(180,160,120,0.2); }
  .fact-original { color:var(--accent); text-decoration:line-through; font-size:0.78rem; margin-bottom:4px; }
  .fact-corrected { color:var(--green); font-weight:600; font-size:0.78rem; }
  .fact-ok { color:var(--green); font-size:0.78rem; margin-bottom:6px; display:block; }
  .draft-body { padding:24px 28px; overflow-y:auto; flex:1; font-size:0.95rem; line-height:2; white-space:pre-wrap; }
  .cat-btn { font-family:'JetBrains Mono', monospace; font-size:0.62rem; font-weight:600; padding:4px 12px; cursor:pointer; border:1px solid var(--border); background:transparent; transition: all 0.15s; }
  .cat-btn.active { background:var(--ink); color:var(--paper); border-color:var(--ink); }
</style>
</head>
<body>

<div class="masthead">
  <div>
    <div class="masthead-title">时评<span>雷达</span></div>
    <div class="masthead-sub">Today's Commentary Intelligence</div>
  </div>
  <div class="masthead-meta">
    <div id="clockDisplay">--:--:--</div>
    <div id="dateDisplay">---- -- --</div>
  </div>
</div>

<div class="toolbar">
  <button class="btn-fetch" id="btnFetch" onclick="startAnalysis()">▶ 开始分析</button>
  <div style="display:flex;gap:6px;">
    <button class="cat-btn" id="providerClaude" onclick="switchProvider('claude')">Claude</button>
    <button class="cat-btn" id="providerDeepseek" onclick="switchProvider('deepseek')">DeepSeek</button>
    <button class="cat-btn" id="providerGemini" onclick="switchProvider('gemini')">Gemini</button>
  </div>
  <div class="key-input-wrap">
    <label id="keyLabel">KEY</label>
    <input class="key-input" id="claudeKey" type="password" oninput="saveKey(this.value)">
  </div>
  <div class="status-bar" id="statusBar">就绪</div>
</div>

<div class="layout">
  <div class="main-col">
    <div class="section-header">
      <div class="section-title">今日推荐选题</div>
      <div id="resultCount" style="font-size:0.7rem;color:var(--muted)">--</div>
    </div>
    <div class="cat-filters">
      <button class="cat-btn active" onclick="filterCat('全部', this)">全部</button>
      <button class="cat-btn" onclick="filterCat('时政社会', this)">时政社会</button>
      <button class="cat-btn" onclick="filterCat('财经商业', this)">财经商业</button>
    </div>
    <div id="resultList"></div>
  </div>

  <div class="side-col">
    <div class="side-title">全网热榜预览 <span id="statTotal" style="color:var(--accent)">--</span></div>
    <div class="raw-list" id="rawList"></div>
  </div>
</div>

<div id="writeDialog" style="display:none;position:fixed;inset:0;background:rgba(26,18,8,0.7);z-index:200;align-items:center;justify-content:center;">
  <div style="background:var(--paper);width:100%;max-width:500px;border:2px solid var(--ink);padding:24px;">
    <div id="dialogTitle" style="font-weight:700;margin-bottom:16px;"></div>
    <div id="dialogAngles" style="margin-bottom:16px;"></div>
    <div style="margin-bottom:16px;">
      <label style="font-size:0.8rem;display:block;margin-bottom:5px;">文章类型</label>
      <select id="writeStyle" class="write-num" style="width:100%">
        <option value="pipeline">社会评论 (六段式)</option>
        <option value="general">通用评论</option>
        <option value="oped">深度 Op-Ed</option>
      </select>
    </div>
    <div style="margin-bottom:16px;">
      <label style="font-size:0.8rem;display:block;margin-bottom:5px;">写作立场</label>
      <select id="writePersona" class="write-num" style="width:100%">
        <option value="editor">主流情绪</option>
        <option value="conservative">保守派</option>
        <option value="radical">激进派</option>
        <option value="scholar">中立学者</option>
      </select>
    </div>
    <button onclick="submitFromDialog()" style="background:var(--ink);color:var(--paper);padding:10px 20px;border:none;cursor:pointer;">开始生成</button>
    <button onclick="closeWriteDialog()" style="background:transparent;padding:10px 20px;border:none;cursor:pointer;">取消</button>
  </div>
</div>

<div class="draft-overlay" id="draftOverlay">
  <div class="draft-box">
    <div class="draft-header">
      <div id="draftTitle">正在生成...</div>
      <button onclick="closeDraft()">关闭</button>
    </div>
    <div class="draft-body" id="draftBody"></div>
    <div class="factcheck-report" id="factcheckReport">
      <div id="factcheckItems"></div>
    </div>
    <div style="padding:10px;text-align:right">
        <button id="btnFactcheck" onclick="startFactcheck()" disabled>事实核查</button>
    </div>
  </div>
</div>

<script>
function updateClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent = now.toLocaleTimeString();
}
setInterval(updateClock, 1000);

function getProvider() { return localStorage.getItem('ai_provider') || 'claude'; }
function saveKey(v) {
  const p = getProvider();
  localStorage.setItem(p + '_key', v);
}

function switchProvider(p) {
  localStorage.setItem('ai_provider', p);
  document.querySelectorAll('.toolbar .cat-btn').forEach(b => b.classList.toggle('active', b.id === 'provider' + p.charAt(0).toUpperCase() + p.slice(1)));
  document.getElementById('keyLabel').textContent = p.toUpperCase() + ' KEY';
  document.getElementById('claudeKey').value = localStorage.getItem(p + '_key') || '';
}

async function callClaude(apiKey, prompt, maxTokens) {
  const provider = getProvider();
  // 核心修复：Gemini 默认使用 flash 确保成功率
  let model = provider === 'gemini' ? 'gemini-1.5-flash' : (provider === 'deepseek' ? 'deepseek-chat' : 'claude-3-5-sonnet-20240620');

  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ apiKey, provider, payload: { model, max_tokens: maxTokens || 4000, messages: [{ role: 'user', content: prompt }] } })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error?.message || '请求失败');
  return data.content?.[0]?.text || '';
}

// 数据抓取与展示
const SOURCES = [
  { key: 'toutiao', name: '今日头条' }, { key: 'thepaper', name: '澎湃新闻' },
  { key: 'sina-news', name: '新浪新闻' }, { key: 'netease-news', name: '网易新闻' },
  { key: 'huxiu', name: '虎嗅' }, { key: '36kr', name: '36氪' }
];

async function fetchHotList() {
  const all = [];
  for (const s of SOURCES) {
    try {
      const res = await fetch(`https://daily-hot-api-vercel-mu.vercel.app/${s.key}`);
      const json = await res.json();
      all.push(...(json.data || []).map(item => ({ ...item, _sourceName: s.name, id: s.key + item.title })));
    } catch(e) {}
  }
  return all;
}

function renderRawList(items) {
  const el = document.getElementById('rawList');
  const groups = {};
  items.forEach(it => { if(!groups[it._sourceName]) groups[it._sourceName]=[]; groups[it._sourceName].push(it); });
  let html = '';
  Object.entries(groups).forEach(([name, list]) => {
    html += `<div class="raw-platform-header">${name}</div>`;
    list.slice(0,10).forEach((it, i) => {
      html += `<div class="raw-item"><span class="raw-rank">${i+1}</span><a href="${it.url}" target="_blank" class="raw-title">${it.title}</a></div>`;
    });
  });
  el.innerHTML = html;
  document.getElementById('statTotal').textContent = items.length;
}

async function startAnalysis() {
  const key = localStorage.getItem(getProvider() + '_key');
  if (!key) return alert('请填入 Key');
  document.getElementById('statusBar').textContent = '深度筛选中 (20条)...';
  try {
    const items = await fetchHotList();
    renderRawList(items);
    const titles = items.map((it, i) => `${i+1}. [${it._sourceName}] ${it.title}`).join('\n');
    const prompt = `评估以下话题，筛选 20 个得分>=7的话题。优先社会民生、财经。返回JSON: {"selected": [{"index": 1, "angles": ["角度1", "角度2"]}]}`;
    const text = await callClaude(key, prompt + "\n" + titles, 4000);
    const analysis = JSON.parse(text.replace(/```json|```/g, '').trim());
    renderResults(items, analysis.selected);
    document.getElementById('statusBar').textContent = '就绪';
  } catch(e) { document.getElementById('statusBar').textContent = e.message; }
}

function renderResults(items, selected) {
  const el = document.getElementById('resultList');
  window._topicData = {};
  el.innerHTML = selected.map((s, i) => {
    const item = items[s.index-1];
    if (!item) return '';
    window._topicData[i] = { title: item.title, angles: s.angles };
    return `<div class="topic-card">
      <div class="card-rank">${i+1}</div>
      <div class="card-body">
        <div class="card-title"><a href="${item.url}" target="_blank">${item.title}</a></div>
        <div class="card-angles">${s.angles.map(a => `<div class="angle-item"><span class="angle-num">角</span>${a}</div>`).join('')}</div>
        <button onclick="openWriteDialog(${i})" style="margin-top:10px">✍ 写这篇</button>
      </div>
    </div>`;
  }).join('');
}

function openWriteDialog(idx) {
  const data = window._topicData[idx];
  window._currentIdx = idx;
  document.getElementById('dialogTitle').textContent = data.title;
  document.getElementById('dialogAngles').innerHTML = data.angles.map((a, i) => `<label style="display:block"><input type="radio" name="angle" value="${i}" ${i===0?'checked':''}> ${a}</label>`).join('');
  document.getElementById('writeDialog').style.display = 'flex';
}
function closeWriteDialog() { document.getElementById('writeDialog').style.display = 'none'; }

async function submitFromDialog() {
  const data = window._topicData[window._currentIdx];
  const angleIdx = document.querySelector('input[name="angle"]:checked').value;
  const angle = data.angles[angleIdx];
  const style = document.getElementById('writeStyle').value;
  const persona = document.getElementById('writePersona').value;
  closeWriteDialog();
  
  const overlay = document.getElementById('draftOverlay');
  overlay.classList.add('open');
  document.getElementById('draftTitle').textContent = data.title;
  document.getElementById('draftBody').textContent = '正在研究背景并撰写深度稿件...';

  try {
    const key = localStorage.getItem(getProvider() + '_key');
    // 先获取研究资料
    const research = await callClaude(key, `针对选题【${data.title}】和角度【${angle}】，提供核心事实和行业逻辑。`, 1000);
    // 再写稿
    const prompt = `你是【${persona}】。基于以下资料写一篇Op-Ed或深度评论。资料：${research}。选题：${data.title}。角度：${angle}。要求：逻辑硬核，严禁废话。`;
    const article = await callClaude(key, prompt, 4000);
    document.getElementById('draftBody').textContent = article;
    document.getElementById('btnFactcheck').disabled = false;
  } catch(e) { document.getElementById('draftBody').textContent = e.message; }
}

async function startFactcheck() {
  const key = localStorage.getItem(getProvider() + '_key');
  const text = document.getElementById('draftBody').textContent;
  document.getElementById('factcheckReport').classList.add('open');
  document.getElementById('factcheckItems').textContent = '正在核查事实一致性...';
  try {
    const prompt = `核查以下文章。ERROR|原文|事实|原因 或 OK|核实点。文章：${text}`;
    const report = await callClaude(key, prompt, 2000);
    const lines = report.split('\n').filter(l => l.trim());
    document.getElementById('factcheckItems').innerHTML = lines.map(line => {
      if (line.startsWith('ERROR|')) {
        const p = line.split('|');
        return `<div class="fact-item"><div class="fact-original">✗ ${p[1]}</div><div class="fact-corrected">✓ ${p[2]}</div></div>`;
      }
      return `<div class="fact-ok">✓ ${line.replace('OK|','')}</div>`;
    }).join('');
  } catch(e) {}
}

function closeDraft() { document.getElementById('draftOverlay').classList.remove('open'); }
window.onload = () => switchProvider(getProvider());
</script>
</body>
</html>
