<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时评雷达 · 事实驱动版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --ink: #1a1208; --paper: #f5f0e8; --cream: #ede8dc; --accent: #c8371a; --gold: #b8860b; --muted: #7a6f5e; --border: #c9bfaa; --green: #1a7a4a; --blue: #1a3a7a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--paper); color: var(--ink); font-family: 'Noto Serif SC', serif; min-height: 100vh; }
  body::before { content:''; position:fixed; inset:0; background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(201, 191, 170, 0.1) 27px, rgba(201, 191, 170, 0.1) 28px); pointer-events:none; z-index:100; }
  
  .container { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; position: relative; z-index: 10; }
  .header { padding: 40px 40px 20px 40px; border-bottom: 2px solid var(--ink); display: flex; align-items: flex-end; justify-content: space-between; }
  .logo-area { display: flex; flex-direction: column; }
  .logo-title { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 900; line-height: 1; letter-spacing: -2px; }
  .logo-subtitle { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; font-weight: 500; text-transform: uppercase; margin-top: 10px; letter-spacing: 4px; }
  
  .nav-bar { padding: 15px 40px; border-bottom: 1px solid var(--ink); display: flex; align-items: center; gap: 30px; background: var(--paper); position: sticky; top: 0; z-index: 50; }
  .provider-toggle { display: flex; gap: 10px; }
  .provider-btn { background: none; border: 1px solid var(--border); padding: 5px 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; cursor: pointer; transition: all 0.2s; }
  .provider-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .key-input-wrap { display: flex; align-items: center; gap: 8px; }
  .key-input { background: none; border: none; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; width: 220px; outline: none; padding: 2px 0; }
  .status-bar { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; margin-left: 15px; }

  .main-grid { display: grid; grid-template-columns: 320px 1fr; flex: 1; }
  .sidebar { border-right: 1px solid var(--ink); padding: 30px; display: flex; flex-direction: column; gap: 40px; }
  .content-area { padding: 0; position: relative; background: white; }
  
  .section-label { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--muted); }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* 还原热榜列表样式 */
  .topic-item { padding: 15px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: all 0.2s; position: relative; }
  .topic-item:hover { transform: translateX(5px); }
  .topic-rank { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.2rem; color: var(--gold); position: absolute; left: -25px; top: 12px; }
  .topic-title { font-weight: 700; font-size: 1.05rem; line-height: 1.4; margin-bottom: 6px; }
  .topic-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); display: flex; gap: 10px; }

  .input-group { margin-bottom: 25px; }
  select, textarea, input[type="text"] { width: 100%; background: var(--cream); border: 1px solid var(--border); padding: 10px; font-family: inherit; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
  .btn-fetch { background: var(--ink); color: var(--paper); border: none; padding: 15px; width: 100%; font-weight: 700; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; }
  .btn-fetch:hover { background: var(--accent); }
  .cat-btn { background: none; border: 1px solid var(--border); padding: 6px 12px; font-size: 0.75rem; font-weight: 600; cursor: pointer; }

  .draft-overlay { position: fixed; inset: 0; background: var(--paper); z-index: 200; display: none; flex-direction: column; overflow-y: auto; }
  .draft-overlay.open { display: flex; }
  .draft-header-bar { padding: 20px 40px; border-bottom: 2px solid var(--ink); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--paper); z-index: 10; }
  .draft-container { max-width: 850px; margin: 60px auto; padding: 0 40px; }
  .draft-title { font-size: 2.8rem; font-weight: 900; margin-bottom: 20px; line-height: 1.1; }
  .draft-meta-info { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted); margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .draft-body { font-size: 1.15rem; line-height: 1.8; text-align: justify; }
  .citation-link { color: var(--blue); text-decoration: none; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; font-weight: bold; margin: 0 2px; }
  
  .factcheck-panel { margin-top: 60px; padding: 30px; background: #fff; border: 1px solid var(--ink); }
  .fact-item { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px dashed var(--border); }
  .status-tag { display: inline-block; padding: 2px 8px; font-size: 0.65rem; font-weight: 900; text-transform: uppercase; margin-right: 10px; }
  .tag-error { background: var(--accent); color: white; }
  .tag-match { background: var(--green); color: white; }
  .fact-original { font-size: 0.9rem; color: var(--muted); text-decoration: line-through; margin: 8px 0; }
  .fact-corrected { font-size: 1rem; font-weight: 700; color: var(--ink); }
  .source-link { display: block; margin-top: 10px; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--blue); }

  /* 草稿箱样式 */
  .draft-list-overlay { position:fixed; inset:0; background:rgba(26,18,8,0.95); z-index:300; display:none; align-items:flex-start; justify-content:center; padding:60px 24px; overflow-y:auto; backdrop-filter: blur(3px); }
  .draft-list-overlay.open { display:flex; }
  .draft-list-box { background:var(--paper); width:100%; max-width:800px; border:2px solid var(--ink); box-shadow: 0 30px 60px rgba(0,0,0,0.4); display:flex; flex-direction:column; }
  .draft-header { padding: 20px 24px; border-bottom: 1px solid var(--ink); display: flex; justify-content: space-between; align-items: center; background: var(--cream); }
  .draft-item { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
  .draft-item:hover { background: var(--cream); }
  .draft-item-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-top: 6px; letter-spacing: 0.5px; }
  .btn-icon { background: none; border: 1px solid var(--border); cursor: pointer; padding: 5px 10px; font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .btn-danger:hover { background: var(--accent); color: var(--paper); border-color: var(--accent); }

  @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
  .loading { animation: blink 1s infinite; }
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <div class="logo-area">
      <div class="logo-title">RADAR.</div>
      <div class="logo-subtitle">OPINION RADAR / FACT DRIVEN EDITION</div>
    </div>
    <div style="text-align: right;">
      <div style="font-size: 0.7rem; font-weight: 700;">PROTOTYPE V2.5</div>
      <div id="currentDate" style="font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--muted);">-- / -- / --</div>
    </div>
  </header>

  <nav class="nav-bar">
    <div class="provider-toggle">
      <button id="btn-claude" class="provider-btn" onclick="switchProvider('claude')">CLAUDE-3.5</button>
      <button id="btn-deepseek" class="provider-btn" onclick="switchProvider('deepseek')">DEEPSEEK-V3</button>
    </div>
    <div class="key-input-wrap">
      <label id="keyLabel" style="font-size:0.6rem; color:var(--muted)">KEY</label>
      <input class="key-input" id="claudeKey" type="password" oninput="saveKey(this.value)" placeholder="输入 API Key...">
    </div>
    <button class="cat-btn" onclick="openDraftBox()" style="margin-left:auto; border-color:var(--ink);">📦 草稿箱 (<span id="draftCount">0</span>)</button>
    <div class="status-bar" id="statusBar" style="margin-left:15px;">就绪</div>
  </nav>

  <main class="main-grid">
    <aside class="sidebar">
      <div>
        <div class="section-label">今日热榜线索</div>
        <div id="topicList"><div style="font-size:0.75rem; color:var(--muted); padding:20px 0;">正在扫描热点数据...</div></div>
      </div>
      <div>
        <div class="section-label">自由创作中心</div>
        <div class="input-group"><input type="text" id="freeTitle" placeholder="输入自定义文章标题..."></div>
        <div class="input-group"><input type="text" id="freeUrl" placeholder="输入参考网页 URL (可选)..."></div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
          <select id="writingStyle" style="flex:1;">
            <option value="fact_first">模式: 新闻实录 (Fact-First)</option>
            <option value="pipeline" selected>模式: 六段式 (Standard)</option>
            <option value="oped">模式: 专栏观点 (Op-Ed)</option>
          </select>
          <select id="persona" style="flex:1;">
            <option value="reporter">立场: 冷峻记者</option>
            <option value="editor" selected>立场: 主流情绪</option>
            <option value="scholar">立场: 中立学者</option>
            <option value="conservative">立场: 保守派</option>
            <option value="radical">立场: 激进派</option>
          </select>
        </div>
        <button class="btn-fetch" id="btnRun" onclick="runFreeWorkflow()">⚡ 启动 RAG 创作引擎</button>
      </div>
    </aside>

    <section class="content-area">
      <div id="editorPlaceholder" style="height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; color:var(--border);">
        <div style="font-size:4rem; font-weight:900; opacity:0.1;">RADAR</div>
        <div style="font-family:'JetBrains Mono'; font-size:0.7rem; letter-spacing:2px;">SELECT A TOPIC OR START FREE WRITING</div>
      </div>
    </section>
  </main>
</div>

<div class="draft-overlay" id="draftOverlay">
    <div class="draft-header-bar">
        <div style="display:flex; align-items:center; gap:20px;">
            <button class="cat-btn" onclick="closeDraft()">← 返回工作台</button>
            <div id="wordCount" style="font-family:'JetBrains Mono'; font-size:0.7rem; color:var(--muted);">0 CHARS</div>
        </div>
        <div style="display:flex; gap:10px;">
            <button id="btnFactcheck" class="cat-btn" onclick="startFactcheck()" disabled style="border-color:var(--green); color:var(--green); padding:8px 15px; font-size:0.7rem">🔍 核查事实与溯源</button>
            <button class="cat-btn" onclick="saveCurrentDraft()" style="padding:8px 15px; border-color:var(--ink);">💾 保存草稿</button>
            <button class="btn-fetch" onclick="copyDraft()" style="padding:8px 20px;">复制纯文本正文</button>
        </div>
    </div>
    <div class="draft-container">
        <div class="draft-title" id="draftTitle">文章标题正在生成...</div>
        <div class="draft-meta-info" id="draftMetaInfo">...</div>
        <div class="draft-body" id="draftBody"><div class="loading">正在通过 RAG 检索并构建全文，请稍候...</div></div>
        <div id="factcheckReport" class="factcheck-panel" style="display:none;">
            <div class="section-label" style="margin-bottom:30px;">事实核查与角标溯源报告</div>
            <div id="reportList"></div>
            <button id="btnRevise" class="btn-fetch" style="margin-top:30px; background:var(--blue);" onclick="applyRevisions()">⚡ 应用修订并添加角标 [1][2]...</button>
        </div>
    </div>
</div>

<div class="draft-list-overlay" id="draftListOverlay">
    <div class="draft-list-box">
        <div class="draft-header">
            <div style="font-weight:900; font-size:1.2rem; font-family:'Playfair Display', serif;">本地草稿箱 <span style="font-size:0.8rem; font-weight:normal; color:var(--muted);">LOCAL DRAFTS</span></div>
            <button onclick="closeDraftBox()" style="cursor:pointer; background:none; border:none;">✕</button>
        </div>
        <div id="draftListContainer" style="min-height:200px; max-height:70vh; overflow-y:auto;"></div>
    </div>
</div>

<script>
let currentTopics = [];
window._currentSourceContent = ""; 
window._currentSourceUrl = "";
window._pendingCorrections = [];
window._currentDraftMeta = null;

window.onload = () => { 
    const today = new Date();
    document.getElementById('currentDate').textContent = today.toLocaleDateString('en-US', { year:'numeric', month:'2-digit', day:'2-digit' }).replace(/\//g, ' / ');
    switchProvider(getProvider());
    updateDraftCount();
    fetchHotTopics();
};

function getProvider() { return localStorage.getItem('radar_provider') || 'claude'; }
function saveKey(v) { localStorage.setItem(getProvider() + '_key', v); }

function switchProvider(p) {
    localStorage.setItem('radar_provider', p);
    document.querySelectorAll('.provider-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + p).classList.add('active');
    document.getElementById('claudeKey').value = localStorage.getItem(p + '_key') || '';
    document.getElementById('keyLabel').textContent = p.toUpperCase() + ' KEY';
}

// --- 完整还原热榜抓取逻辑 ---
async function fetchHotTopics() {
    const list = document.getElementById('topicList');
    updateStatus('正在获取实时热榜...');
    try {
        const res = await fetch('https://api.vvhan.com/api/hotlist/zhihu');
        const data = await res.json();
        currentTopics = data.data.slice(0, 20);
        list.innerHTML = currentTopics.map((t, i) => `
            <div class="topic-item" onclick="selectTopic(${i})">
                <span class="topic-rank">${(i+1).toString().padStart(2, '0')}</span>
                <div class="topic-title">${t.title}</div>
                <div class="topic-meta"><span>ZHIHU HOT</span> | <span>HOTNESS: ${t.hot}</span></div>
            </div>`).join('');
        updateStatus('线索抓取完成');
    } catch (e) {
        list.innerHTML = '<div style="color:var(--accent); font-size:0.7rem;">获取热榜失败</div>';
    }
}

function selectTopic(index) {
    const topic = currentTopics[index];
    document.getElementById('freeTitle').value = topic.title;
    document.getElementById('freeUrl').value = topic.url;
    updateStatus('已选择: ' + topic.title);
}

async function runFreeWorkflow() {
    const title = document.getElementById('freeTitle').value;
    const url = document.getElementById('freeUrl').value;
    const style = document.getElementById('writingStyle').value;
    const persona = document.getElementById('persona').value;
    if(!title) return alert('请选择话题');
    openDraft();
    document.getElementById('draftTitle').textContent = title;
    if(url) {
        updateStatus('RAG: 正在解析网页...');
        try {
            const res = await fetch(`https://r.jina.ai/${url}`);
            window._currentSourceContent = await res.text();
            window._currentSourceUrl = url;
        } catch(e) {}
    }
    await executeWorkflow(title, "默认", style, persona, 800, url);
}

// --- 完整还原 System Prompt 与生成逻辑 ---
async function executeWorkflow(title, angle, style, persona, wordcount, url) {
    window._currentDraftMeta = { title, angle, style, persona, wordcount, url };
    const key = localStorage.getItem(getProvider() + '_key');
    const body = document.getElementById('draftBody');
    body.innerHTML = '<div class="loading">正在构建逻辑架构并撰写深度评论...</div>';

    const systemPrompt = `你是一位顶级专栏作家。
立场设定: ${persona}。
模式设定: ${style}。
${window._currentSourceContent ? `背景参考: ${window._currentSourceContent.substring(0, 5000)}` : ''}

要求：
1. 语言必须深刻、冷峻或富有张力，严禁使用“总而言之”、“综上所述”等低级连接词。
2. 保持字数在 ${wordcount} 左右。
3. 绝对不要使用**加粗**语法，请使用纯文本配合优雅的分段。`;

    try {
        const result = await callClaude(key, `以《${title}》为题创作一篇深度评论。`, 4000, systemPrompt);
        body.innerHTML = result.replace(/\n/g, '<br>');
        const styleMap = { fact_first: '新闻实录', pipeline: '六段式', oped: 'Op-Ed' };
        const personaMap = { reporter: '冷峻记者', editor: '主流情绪', scholar: '中立学者', conservative: '保守派', radical: '激进派' };
        document.getElementById('draftMetaInfo').textContent = `[ 模式: ${styleMap[style]||style} | 立场: ${personaMap[persona]||persona} | 实时生成自: ${getProvider().toUpperCase()} ]`;
        document.getElementById('wordCount').textContent = result.length + ' 字符';
        document.getElementById('btnFactcheck').disabled = false;
        updateStatus('生成完成');
    } catch (e) { body.innerHTML = '生成失败: ' + e.message; }
}

// --- 完整还原事实核查逻辑 ---
async function startFactcheck() {
    const btn = document.getElementById('btnFactcheck');
    btn.textContent = '⚡ 正在交叉比对事实...';
    btn.disabled = true;
    const text = document.getElementById('draftBody').innerText;
    const prompt = `分析以下文章，找出其中包含的具体“事实陈述”（如时间、人物、数字、具体事件描述）。针对每个事实进行核查：1. 如果该事实与一般认知或参考内容不符，标记为 ERROR。2. 提供正确的描述。3. 无论对错，都通过百度新闻搜索生成一个最相关的参考溯源链接。输出格式必须为 JSON 数组：[{"original": "原文陈述", "corrected": "修正后陈述", "status": "ERROR/MATCH", "sourceLink": "百度新闻搜索链接"}] \n文章内容：\n${text.substring(0, 2000)}`;
    
    try {
        const res = await callClaude(localStorage.getItem(getProvider() + '_key'), prompt, 2000, "你是一个严谨的事实核查员。只输出 JSON，不要回复任何其他文字。");
        const results = JSON.parse(res.substring(res.indexOf('['), res.lastIndexOf(']') + 1));
        window._pendingCorrections = results.filter(r => r.status === 'ERROR');
        document.getElementById('reportList').innerHTML = results.map(r => `
            <div class="fact-item">
                <div><span class="status-tag ${r.status === 'ERROR' ? 'tag-error' : 'tag-match'}">${r.status}</span><span style="font-size:0.8rem; font-weight:700;">${r.original.substring(0, 30)}...</span></div>
                ${r.status === 'ERROR' ? `<div class="fact-original">原文: ${r.original}</div><div class="fact-corrected">修正: ${r.corrected}</div>` : ''}
                <a class="source-link" href="${r.sourceLink}" target="_blank">🔗 百度新闻溯源验证 ></a>
            </div>`).join('');
        document.getElementById('factcheckReport').style.display = 'block';
        btn.textContent = '🔍 核查完成';
    } catch(e) { alert(e.message); btn.textContent = '🔍 核查事实与溯源'; btn.disabled = false; }
}

async function applyRevisions() {
    const btn = document.getElementById('btnRevise');
    btn.textContent = '⚡ 正在应用修订...';
    const key = localStorage.getItem(getProvider() + '_key');
    const originalText = document.getElementById('draftBody').innerText;
    const rules = window._pendingCorrections.map((c, i) => `规则 ${i+1}: 将错误描述 "${c.original}" 替换为 "${c.corrected}"，并在其后插入HTML角标：<a class="citation-link" href="${c.sourceLink}" target="_blank">[${i+1}]</a>`).join('\n');
    try {
        const revised = await callClaude(key, `你是排版编辑。根据规则修改原文。只输出修改后的全文（包含插入的HTML角标），绝对不要使用**加粗，保留换行。\n规则：\n${rules}\n\n原文：\n${originalText}`, 4000);
        document.getElementById('draftBody').innerHTML = revised.replace(/\*\*/g, '').replace(/\n/g, '<br>');
        btn.textContent = '✓ 修订完成';
    } catch(e) {}
}

// --- 草稿箱功能 ---
function getDrafts() { return JSON.parse(localStorage.getItem('radar_drafts') || '[]'); }
function updateDraftCount() { document.getElementById('draftCount').textContent = getDrafts().length; }
function saveCurrentDraft() {
    const body = document.getElementById('draftBody').innerHTML;
    if(!body || body.includes('loading')) return alert('无内容可保存');
    const drafts = getDrafts();
    drafts.unshift({ id: Date.now(), date: new Date().toLocaleString(), content: body, ...window._currentDraftMeta });
    localStorage.setItem('radar_drafts', JSON.stringify(drafts));
    updateDraftCount(); alert('已保存至草稿箱');
}
function openDraftBox() {
    const container = document.getElementById('draftListContainer');
    const drafts = getDrafts();
    if(drafts.length === 0) { container.innerHTML = '<div style="padding:40px; text-align:center; color:var(--muted);">空</div>'; }
    else {
        container.innerHTML = drafts.map(d => `
            <div class="draft-item">
                <div style="flex:1"><strong>${d.title}</strong><div class="draft-item-meta">${d.date} | ${d.persona}</div></div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-icon" onclick="loadDraft(${d.id})">读取</button>
                    <button class="btn-icon btn-danger" onclick="deleteDraft(${d.id})">删</button>
                </div>
            </div>`).join('');
    }
    document.getElementById('draftListOverlay').classList.add('open');
}
function loadDraft(id) {
    const d = getDrafts().find(x => x.id == id);
    if(!d) return;
    window._currentDraftMeta = d;
    document.getElementById('draftTitle').textContent = d.title;
    document.getElementById('draftBody').innerHTML = d.content;
    document.getElementById('wordCount').textContent = document.getElementById('draftBody').innerText.length + ' 字符';
    document.getElementById('factcheckReport').style.display = 'none';
    document.getElementById('btnFactcheck').disabled = false;
    closeDraftBox(); openDraft();
}
function deleteDraft(id) { 
    localStorage.setItem('radar_drafts', JSON.stringify(getDrafts().filter(x => x.id != id))); 
    openDraftBox(); updateDraftCount(); 
}
function closeDraftBox() { document.getElementById('draftListOverlay').classList.remove('open'); }
function openDraft() { document.getElementById('draftOverlay').classList.add('open'); }
function closeDraft() { document.getElementById('draftOverlay').classList.remove('open'); }
function updateStatus(msg) { document.getElementById('statusBar').textContent = msg; }
function copyDraft() { navigator.clipboard.writeText(document.getElementById('draftBody').innerText); alert('已复制'); }

async function callClaude(key, prompt, maxTokens, system = "") {
    const isClaude = getProvider() === 'claude';
    const url = isClaude ? "https://api.anthropic.com/v1/messages" : "https://api.deepseek.com/chat/completions";
    const body = isClaude ? 
        { model: "claude-3-5-sonnet-20240620", max_tokens: maxTokens, system, messages: [{role:"user", content:prompt}] } :
        { model: "deepseek-chat", messages: [{role:"system", content:system}, {role:"user", content:prompt}] };
    
    const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'Authorization': `Bearer ${key}`, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify(body)
    });
    const data = await res.json();
    return isClaude ? data.content[0].text : data.choices[0].message.content;
}
