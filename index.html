<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时评雷达 · 今日可写什么</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --ink: #1a1208; --paper: #f5f0e8; --cream: #ede8dc; --accent: #c8371a; --gold: #b8860b; --muted: #7a6f5e; --border: #c9bfaa; --green: #1a7a4a; --blue: #1a3a7a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--paper); color: var(--ink); font-family: 'Noto Serif SC', serif; min-height: 100vh; }
  body::before { content:''; position:fixed; inset:0; background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,160,120,0.12) 27px, rgba(180,160,120,0.12) 28px); pointer-events:none; z-index:0; }
  
  .masthead { border-bottom: 3px double var(--ink); padding: 18px 40px 14px; display: flex; align-items: baseline; justify-content: space-between; background: var(--paper); z-index:1; position:relative; }
  .masthead-title { font-family: 'Playfair Display', serif; font-size: 2.6rem; font-weight:900; letter-spacing:-1px; line-height:1; }
  .masthead-title span { color: var(--accent); }
  
  .toolbar { padding: 12px 40px; border-bottom: 1px solid var(--border); background: var(--cream); display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:10; }
  .btn-fetch { font-family:'JetBrains Mono', monospace; font-size:0.75rem; font-weight:600; background: var(--ink); color: var(--paper); border:none; padding:8px 20px; cursor:pointer; transition: background 0.15s; }
  .btn-fetch:hover { background: var(--accent); }
  .btn-fetch:disabled { background: var(--border); cursor:not-allowed; }
  
  .key-input-wrap { display:flex; align-items:center; gap:8px; flex:1; max-width:420px; }
  .key-input { font-family:'JetBrains Mono', monospace; font-size:0.7rem; border: 1px solid var(--border); background: var(--paper); padding:6px 10px; flex:1; outline:none; }
  
  .layout { display:grid; grid-template-columns: 1fr 340px; min-height: calc(100vh - 120px); position:relative; z-index:1; }
  .main-col { padding: 28px 36px; border-right:1px solid var(--border); }
  .side-col { padding:24px 24px; }
  
  .section-header { display:flex; align-items:baseline; justify-content:space-between; border-bottom: 2px solid var(--ink); padding-bottom:8px; margin-bottom:20px; }
  .section-title { font-family:'Playfair Display', serif; font-size:1.1rem; font-weight:700; letter-spacing:0.5px; }
  
  .topic-card { padding: 20px 0; border-bottom: 1px solid rgba(180,160,120,0.3); display:grid; grid-template-columns: 36px 1fr; gap:12px; animation: fadeIn 0.3s ease both; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .card-rank { font-family:'Playfair Display', serif; font-size:1.4rem; font-weight:900; color:var(--border); line-height:1; }
  .card-title a { color:inherit; text-decoration:none; font-weight:700; font-size:1.1rem; }
  .card-title a:hover { color: var(--accent); }
  .angle-item { display:flex; align-items:flex-start; gap:8px; font-size:0.85rem; line-height:1.6; color:var(--ink); margin-top:8px; }
  .angle-num { font-family:'JetBrains Mono', monospace; font-size:0.6rem; color:var(--paper); background: var(--muted); padding:1px 5px; margin-top:3px; flex-shrink:0; }
  
  .raw-platform-header { font-family:'JetBrains Mono', monospace; font-size:0.6rem; font-weight:600; color:var(--paper); background:var(--ink); padding:3px 8px; margin:15px 0 5px; }
  .raw-item { display:flex; align-items:baseline; gap:10px; padding:6px 0; border-bottom:1px solid rgba(0,0,0,0.05); font-size:0.75rem; }
  
  .free-write-section { border-top:3px double var(--ink); padding:40px 36px; background:var(--cream); position:relative; z-index:1; }
  
  /* ── 弹窗与写稿遮罩 ── */
  .draft-overlay { position:fixed; inset:0; background:rgba(26,18,8,0.95); z-index:100; display:none; align-items:center; justify-content:center; padding:24px; }
  .draft-overlay.open { display:flex; }
  .draft-box { background:var(--paper); width:100%; max-width:850px; max-height:92vh; display:flex; flex-direction:column; border:2px solid var(--ink); box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
  
  /* 正文区 */
  .draft-body { padding:30px; overflow-y:auto; flex:1; font-size:1.05rem; line-height:2.2; white-space:pre-wrap; }
  
  /* 事实核查报告区 */
  .factcheck-report { padding:20px; border-top:1px solid var(--border); background:var(--cream); font-size:0.8rem; display:none; max-height:300px; overflow-y:auto; }
  .fact-item { margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid rgba(0,0,0,0.1); }
  .fact-original { color:var(--accent); text-decoration:line-through; margin-bottom:6px; font-size:0.85rem;}
  .fact-corrected { color:var(--green); font-weight:600; margin-bottom:6px; font-size:0.85rem;}
  .fact-link { color:var(--blue); text-decoration:underline; font-size:0.8rem; display:inline-block; margin-top:2px; }
  .fact-ok { color:var(--green); font-size:0.85rem; margin-bottom:8px;}
  
  /* 正文内联引用的角标样式 */
  .citation-link { color:var(--blue); text-decoration:none; font-size:0.75rem; vertical-align:super; font-family:monospace; margin:0 2px; }
  .citation-link:hover { text-decoration:underline; }
  
  .cat-btn { font-family:'JetBrains Mono', monospace; font-size:0.62rem; font-weight:600; padding:5px 15px; cursor:pointer; border:1px solid var(--border); background:transparent; }
  .cat-btn.active { background:var(--ink); color:var(--paper); }
  .write-num { font-family:'JetBrains Mono', monospace; font-size:0.8rem; border:1px solid var(--border); padding:10px; background:var(--paper); outline:none; }
  
  .btn-revise { background: var(--green); color: white; border: none; padding: 6px 15px; font-family: monospace; font-weight: 700; cursor: pointer; display: none; }
  .btn-revise.active { display: inline-block; animation: pulse 2s infinite; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
</style>
</head>
<body>

<div class="masthead">
  <div><div class="masthead-title">时评<span>雷达</span></div><div class="masthead-sub">Today's Intelligence for Master Researcher</div></div>
  <div style="font-family:monospace; font-size:0.7rem;" id="clockDisplay"></div>
</div>

<div class="toolbar">
  <button class="btn-fetch" id="btnFetch" onclick="startAnalysis()">▶ 开始分析</button>
  <div style="display:flex;gap:6px;">
    <button class="cat-btn" id="providerClaude" onclick="switchProvider('claude')">Claude</button>
    <button class="cat-btn" id="providerDeepseek" onclick="switchProvider('deepseek')">DeepSeek</button>
    <button class="cat-btn" id="providerGemini" onclick="switchProvider('gemini')">Gemini</button>
  </div>
  <div class="key-input-wrap">
    <label id="keyLabel" style="font-size:0.6rem; color:var(--muted)">KEY</label>
    <input class="key-input" id="claudeKey" type="password" oninput="saveKey(this.value)">
  </div>
  <div class="status-bar" id="statusBar">就绪</div>
</div>

<div class="layout">
  <div class="main-col">
    <div class="section-header">
      <div class="section-title">今日推荐选题</div>
      <div id="resultCount" style="font-family:monospace; font-size:0.7rem;">-- SELECTIONS</div>
    </div>
    <div id="resultList">
        <div style="padding:100px 0; text-align:center; color:var(--muted)">点击“开始分析”获取今日 20 条深度评论选题</div>
    </div>
  </div>
  <div class="side-col">
    <div class="side-title" style="font-size:0.7rem; letter-spacing:1px; text-transform:uppercase; border-bottom:1px solid var(--border); padding-bottom:5px; margin-bottom:10px;">全网实时榜单</div>
    <div class="raw-list" id="rawList"></div>
  </div>
</div>

<div class="free-write-section">
    <div class="section-title">自由创作中心</div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">
        <div style="grid-column: 1/-1">
            <label style="font-size:0.65rem; color:var(--muted); display:block; margin-bottom:5px">选题标题</label>
            <input class="write-num" id="freeTitle" style="width:100%;" placeholder="在此输入你想探讨的话题...">
        </div>
        <div>
            <label style="font-size:0.65rem; color:var(--muted); display:block; margin-bottom:5px">文章模式</label>
            <select id="freeStyle" class="write-num" style="width:100%"><option value="pipeline">硬核六段式</option><option value="oped">深度 Op-Ed</option><option value="general">通用评论</option></select>
        </div>
        <div>
            <label style="font-size:0.65rem; color:var(--muted); display:block; margin-bottom:5px">写作立场</label>
            <select id="freePersona" class="write-num" style="width:100%"><option value="editor">主流情绪</option><option value="scholar">中立学者</option><option value="conservative">保守派</option><option value="radical">激进派</option></select>
        </div>
        <div style="grid-column: 1/-1">
            <label style="font-size:0.65rem; color:var(--muted); display:block; margin-bottom:5px">核心论点</label>
            <textarea id="freeAngle" class="write-num" style="width:100%; height:80px; font-family:serif;" placeholder="描述你的切入视角或论点..."></textarea>
        </div>
    </div>
    <div style="text-align:right; margin-top:20px;"><button class="btn-fetch" onclick="submitFreeWrite()">▶ 开始深度创作</button></div>
</div>

<div id="writeDialog" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; align-items:center; justify-content:center;">
    <div style="background:var(--paper); width:90%; max-width:600px; padding:35px; border:2px solid var(--ink); position:relative;">
        <div id="dialogTitle" style="font-weight:900; font-size:1.2rem; margin-bottom:20px; line-height:1.4"></div>
        <div style="font-family:monospace; font-size:0.65rem; color:var(--muted); margin-bottom:8px">选择写作角度 (可多选)</div>
        <div id="dialogAngles" style="margin-bottom:20px; background:var(--cream); padding:15px; border:1px solid var(--border); max-height:220px; overflow-y:auto;"></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:25px;">
            <div><select id="diagStyle" class="write-num" style="width:100%"><option value="pipeline">六段式结构</option><option value="oped">深度 Op-Ed</option><option value="general">通用评论</option></select></div>
            <div><select id="diagPersona" class="write-num" style="width:100%"><option value="editor">主流情绪</option><option value="scholar">中立学者</option><option value="conservative">保守派</option><option value="radical">激进派</option></select></div>
        </div>
        <div style="text-align:right">
            <button onclick="closeWriteDialog()" style="background:none; border:none; margin-right:15px; cursor:pointer; font-family:monospace">CANCEL</button>
            <button class="btn-fetch" onclick="submitFromDialog()">START WRITING</button>
        </div>
    </div>
</div>

<div class="draft-overlay" id="draftOverlay">
    <div class="draft-box">
        <div class="masthead" style="padding:15px 25px">
            <div id="draftTitle" style="font-weight:700"></div>
            <button onclick="closeDraft()" style="cursor:pointer; background:none; border:none; font-size:1.2rem">✕</button>
        </div>
        
        <div class="draft-body" id="draftBody"></div>
        
        <div class="factcheck-report" id="factcheckReport" style="display:none">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <div style="font-family:monospace; font-size:0.6rem; color:var(--muted);">FACT-CHECK REPORT</div>
                <button id="btnRevise" class="btn-revise" onclick="applyRevisions()">⚡ 应用修订至正文</button>
            </div>
            <div id="factcheckItems"></div>
        </div>
        
        <div style="padding:15px 25px; text-align:right; background:var(--cream); border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <div id="wordCount" style="font-family:monospace; font-size:0.7rem; color:var(--muted)"></div>
            <div>
                <button id="btnFactcheck" class="cat-btn" onclick="startFactcheck()" disabled style="border-color:var(--green); color:var(--green); padding:8px 15px">🔍 核查事实与溯源</button>
                <button class="btn-fetch" onclick="copyDraft()" style="padding:8px 20px; margin-left:10px;">复制全文 (含角标)</button>
            </div>
        </div>
    </div>
</div>

<script>
window._topicData = {};
window._pendingCorrections = []; // 暂存需要修正的事实清单

function updateClock() { document.getElementById('clockDisplay').textContent = new Date().toLocaleString(); }
setInterval(updateClock, 1000); updateClock();

function getProvider() { return localStorage.getItem('ai_provider') || 'claude'; }
function saveKey(v) { localStorage.setItem(getProvider() + '_key', v); }

function switchProvider(p) {
    localStorage.setItem('ai_provider', p);
    document.querySelectorAll('.toolbar .cat-btn').forEach(b => b.classList.toggle('active', b.id.toLowerCase() === 'provider' + p));
    document.getElementById('keyLabel').textContent = p.toUpperCase() + ' KEY';
    document.getElementById('claudeKey').value = localStorage.getItem(p + '_key') || '';
}

async function callClaude(apiKey, prompt, maxTokens) {
    const provider = getProvider();
    let model = 'claude-3-5-sonnet-latest';
    if (provider === 'deepseek') model = 'deepseek-chat';
    if (provider === 'gemini') model = 'gemini-1.5-flash-latest';

    const res = await fetch('/api/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apiKey, provider, payload: { model, max_tokens: maxTokens || 4000, messages: [{ role: 'user', content: prompt }] } })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || '请求失败');
    return data.content?.[0]?.text || '';
}

async function startAnalysis() {
    const key = localStorage.getItem(getProvider() + '_key');
    if (!key) return alert('请填入 Key');
    document.getElementById('statusBar').textContent = '挖掘中...';
    try {
        const SOURCES = [ {key:'toutiao',name:'今日头条'}, {key:'thepaper',name:'澎湃新闻'}, {key:'huxiu',name:'虎嗅'}, {key:'36kr',name:'36氪'}, {key:'sina-news',name:'新浪新闻'}, {key:'netease-news',name:'网易新闻'} ];
        const results = await Promise.all(SOURCES.map(s => fetch(`https://daily-hot-api-vercel-mu.vercel.app/${s.key}`).then(r => r.json()).catch(()=>({data:[]}))));
        const allItems = results.flatMap((r, i) => (r.data || []).map(item => ({...item, _sourceName: SOURCES[i].name})));
        
        const groups = {};
        allItems.forEach(it => { if(!groups[it._sourceName]) groups[it._sourceName]=[]; groups[it._sourceName].push(it); });
        document.getElementById('rawList').innerHTML = Object.entries(groups).map(([name, list]) => `<div class="raw-platform-header">${name}</div>` + list.slice(0,6).map((it, i) => `<div class="raw-item"><span style="color:var(--muted);width:20px">${i+1}</span><a href="${it.url}" target="_blank" style="color:inherit; text-decoration:none">${it.title}</a></div>`).join('')).join('');
        
        const titles = allItems.slice(0, 80).map((it, i) => `${i+1}. [${it._sourceName}] ${it.title}`).join('\n');
        const text = await callClaude(key, `请从以下榜单筛选出 20 个值得写深度评论的话题。返回JSON: {"selected": [{"index":序号, "angles":["视角1", "视角2"]}]}\n列表：\n${titles}`, 4000);
        const analysis = JSON.parse(text.replace(/```json|```/g, '').trim());
        
        document.getElementById('resultList').innerHTML = analysis.selected.map((s, i) => {
            const item = allItems[s.index-1];
            if(!item) return '';
            window._topicData[i] = { title: item.title, angles: s.angles };
            return `<div class="topic-card"><div class="card-rank">${i+1}</div><div class="card-body"><div class="card-title"><a href="${item.url}" target="_blank">${item.title}</a></div><div class="card-angles">${s.angles.map(a => `<div class="angle-item"><span class="angle-num">视角</span>${a}</div>`).join('')}</div><button onclick="openWriteDialog(${i})" style="margin-top:15px; cursor:pointer; padding:4px 12px; border:1px solid var(--gold); color:var(--gold); background:transparent">✍ 写这篇</button></div></div>`;
        }).join('');
        document.getElementById('statusBar').textContent = '分析完成';
        document.getElementById('resultCount').textContent = analysis.selected.length + ' SELECTIONS';
    } catch(e) { alert(e.message); }
}

function openWriteDialog(idx) {
    const data = window._topicData[idx];
    if(!data) return alert('数据加载失败');
    window._currentIdx = idx;
    document.getElementById('dialogTitle').textContent = data.title;
    
    let html = data.angles.map((a, i) => 
        `<label style="display:block; margin-bottom:10px; cursor:pointer; font-size:0.9rem"><input type="checkbox" name="angleCheck" value="${i}" ${i===0?'checked':''}> ${a}</label>`
    ).join('');
    html += `<label style="display:block; margin-bottom:10px; cursor:pointer; font-size:0.9rem"><input type="checkbox" id="customAngleToggle"> 自定义视角...</label>`;
    html += `<input type="text" id="customAngleInput" class="write-num" style="width:100%; display:none;" placeholder="输入你的自定义视角...">`;
    
    document.getElementById('dialogAngles').innerHTML = html;
    document.getElementById('customAngleToggle').onchange = function() { document.getElementById('customAngleInput').style.display = this.checked ? 'block' : 'none'; };
    document.getElementById('writeDialog').style.display = 'flex';
}

function closeWriteDialog() { document.getElementById('writeDialog').style.display = 'none'; }

async function submitFromDialog() {
    const data = window._topicData[window._currentIdx];
    let selectedAngles = [];
    document.querySelectorAll('input[name="angleCheck"]:checked').forEach(cb => selectedAngles.push(data.angles[cb.value]));
    if(document.getElementById('customAngleToggle').checked) {
        const customVal = document.getElementById('customAngleInput').value.trim();
        if(customVal) selectedAngles.push(customVal);
    }
    if(selectedAngles.length === 0) return alert('请至少勾选一个视角！');
    
    closeWriteDialog();
    executeWorkflow(data.title, selectedAngles.join('；同时融合：'), document.getElementById('diagStyle').value, document.getElementById('diagPersona').value);
}

function submitFreeWrite() {
    const t = document.getElementById('freeTitle').value; const a = document.getElementById('freeAngle').value;
    if(!t || !a) return alert('请补全信息');
    executeWorkflow(t, a, document.getElementById('freeStyle').value, document.getElementById('freePersona').value);
}

async function executeWorkflow(title, angle, style, persona) {
    const overlay = document.getElementById('draftOverlay');
    overlay.classList.add('open');
    const body = document.getElementById('draftBody');
    body.innerHTML = '<div style="text-align:center; padding:50px; font-family:monospace;">PHASE 1: 正在检索行业事实与经济逻辑...</div>';
    
    // 重置状态
    document.getElementById('factcheckReport').style.display = 'none';
    document.getElementById('btnFactcheck').disabled = true;
    document.getElementById('btnRevise').classList.remove('active');
    window._pendingCorrections = [];
    
    try {
        const key = localStorage.getItem(getProvider() + '_key');
        const research = await callClaude(key, `针对选题【${title}】和视角【${angle}】，提供核心事实和硬核逻辑。严禁抒情。`, 1200);
        body.innerHTML = '<div style="text-align:center; padding:50px; font-family:monospace; color:var(--green)">PHASE 2: 正在构建硬核深度评论...</div>';
        
        let prompt = `你是【${persona}】。写一篇1200字硬核评论。资料：${research}。选题：${title}。角度：${angle}。要求：拒绝套话，不使用markdown加粗。`;
        if(style === 'oped') prompt = `写一篇深度 Op-Ed 评论。反共识视角、智识压制、流体思维。选题：${title}。资料：${research}`;
        else if(style === 'pipeline') prompt += " 结构：破题（特写）、拆解（因果）、关联（痛点）、定调（金句）、追问（对标）、升华（共鸣）。";

        const raw = await callClaude(key, prompt, 4000);
        // 去除星号
        const cleaned = raw.replace(/\*\*/g, '');
        
        body.innerHTML = cleaned.replace(/\n/g, '<br>'); // 保留换行
        document.getElementById('draftTitle').textContent = title;
        document.getElementById('wordCount').textContent = cleaned.length + ' 字';
        document.getElementById('btnFactcheck').disabled = false;
    } catch(e) { body.innerHTML = `<div style="color:var(--accent)">生成失败: ${e.message}</div>`; }
}

// ── 新版事实核查与外部链接提取 ──
async function startFactcheck() {
    const itemsEl = document.getElementById('factcheckItems');
    document.getElementById('factcheckReport').style.display = 'block';
    document.getElementById('btnRevise').classList.remove('active');
    window._pendingCorrections = []; // 清空待修清单
    
    itemsEl.innerHTML = '<div style="font-family:monospace; color:var(--gold)">正在提取文章事实，并强制检索权威外部新闻链接进行比对...</div>';
    
    try {
        const key = localStorage.getItem(getProvider() + '_key');
        // 核心修改点：强制 AI 查找真正的外部信源
        const prompt = `你是一个极度严苛的事实核查机器。请核查以下评论文章的事实真实性。
非常重要：对于每一个核查点，你必须提供一个真实存在的外部权威新闻网或数据机构的链接（如 news.sina.com.cn, reuters.com, stats.gov.cn等），绝对不能伪造链接，也不能使用类似 commentary-radar.vercel.app 这种站内链接。

严格按以下格式输出（每行一个）：
ERROR|原文错误表述|正确的事实描述|发现错误的原因|权威参考新闻的标题|权威外部新闻的URL链接
OK|已核实的事实描述|权威参考新闻的标题|权威外部新闻的URL链接

文章内容：\n${document.getElementById('draftBody').innerText}`;
        
        const report = await callClaude(key, prompt, 3000);
        const lines = report.split('\n').filter(l => l.trim() && (l.startsWith('ERROR|') || l.startsWith('OK|')));
        
        if (lines.length === 0) {
            itemsEl.innerHTML = `<div style="color:var(--muted)">未检测到需要核查的硬性事实，或模型未按规范返回。</div>`;
            return;
        }

        let html = '';
        lines.forEach((line, index) => {
            const p = line.split('|');
            if(line.startsWith('ERROR|')) {
                const title = p[4] && p[4].length > 2 ? p[4] : '参考来源';
                const link = p[5] && p[5].startsWith('http') ? p[5] : '#';
                
                // 将错误加入待修订队列
                window._pendingCorrections.push({
                    original: p[1],
                    corrected: p[2],
                    sourceTitle: title,
                    sourceLink: link,
                    id: index
                });
                
                html += `<div class="fact-item">
                    <div class="fact-original">✗ 错误：${p[1]}</div>
                    <div class="fact-corrected">✓ 应为：${p[2]}</div>
                    <a class="fact-link" href="${link}" target="_blank">🔗 信源：${title}</a>
                </div>`;
            } else if (line.startsWith('OK|')) {
                const title = p[2] && p[2].length > 2 ? p[2] : '参考来源';
                const link = p[3] && p[3].startsWith('http') ? p[3] : '#';
                html += `<div class="fact-ok">
                    ✓ 核实：${p[1]}
                    <a class="fact-link" href="${link}" target="_blank" style="margin-left:15px">🔗 验证：${title}</a>
                </div>`;
            }
        });
        
        itemsEl.innerHTML = html;
        
        // 如果有错误，激活“一键修订”按钮
        if (window._pendingCorrections.length > 0) {
            document.getElementById('btnRevise').classList.add('active');
        }
        
    } catch(e) { itemsEl.innerHTML = `<div style="color:var(--accent)">核查异常: ${e.message}</div>`; }
}

// ── 新增：一键修订与角标注入功能 ──
async function applyRevisions() {
    if (window._pendingCorrections.length === 0) return;
    
    const btn = document.getElementById('btnRevise');
    btn.textContent = '⚡ 正在应用修订并嵌入角标...';
    btn.classList.remove('active');
    
    const key = localStorage.getItem(getProvider() + '_key');
    const originalText = document.getElementById('draftBody').innerText;
    
    // 构造修改指令，并要求 AI 插入 HTML 格式的角标
    const correctionRules = window._pendingCorrections.map((c, i) => 
        `规则 ${i+1}: 将错误描述 "${c.original}" 替换为正确的 "${c.corrected}"，并在该句末尾紧接着插入这段HTML角标：<a class="citation-link" href="${c.sourceLink}" target="_blank" title="${c.sourceTitle}">[${i+1}]</a>`
    ).join('\n');

    const prompt = `你现在是一个排版编辑。请根据以下修改规则，直接修改提供的文章正文。
要求：
1. 必须完全保留文章的其他内容和换行。
2. 将修改好的内容以纯文本返回（但是里面要包含我指定的HTML角标代码）。
3. 不要输出任何多余的解释。

修改规则：
${correctionRules}

原文：
${originalText}`;

    try {
        const revisedRaw = await callClaude(key, prompt, 4000);
        // 将文本的换行转换为 HTML 的 <br>，同时保留 AI 插入的 <a> 标签
        document.getElementById('draftBody').innerHTML = revisedRaw.replace(/\n/g, '<br>');
        btn.textContent = '✓ 修订已完成';
        btn.style.background = 'var(--border)';
    } catch(e) {
        alert('修订失败: ' + e.message);
        btn.textContent = '⚡ 应用修订至正文';
        btn.classList.add('active');
    }
}

function closeDraft() { document.getElementById('draftOverlay').classList.remove('open'); }

// 优化了复制功能，确保角标序号可以被一起复制（虽然链接无法在纯文本中保留，但带角标方便查阅）
function copyDraft() { 
    const el = document.getElementById('draftBody');
    navigator.clipboard.writeText(el.innerText); 
    alert('已复制内容'); 
}

window.onload = () => switchProvider(getProvider());
</script>
