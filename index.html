<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时评雷达 · 事实驱动完整版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --ink: #1a1208; --paper: #f5f0e8; --cream: #ede8dc; --accent: #c8371a; --gold: #b8860b; --muted: #7a6f5e; --border: #c9bfaa; --green: #1a7a4a; --blue: #1a3a7a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--paper); color: var(--ink); font-family: 'Noto Serif SC', serif; min-height: 100vh; }
  body::before { content:''; position:fixed; inset:0; background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,160,120,0.12) 27px, rgba(180,160,120,0.12) 28px); pointer-events:none; z-index:0; }
  .masthead { border-bottom: 3px double var(--ink); padding: 18px 40px 14px; display: flex; align-items: baseline; justify-content: space-between; background: var(--paper); z-index:1; position:relative; }
  .masthead-title { font-family: 'Playfair Display', serif; font-size: 2.6rem; font-weight:900; letter-spacing:-1px; line-height:1; }
  .masthead-title span { color: var(--accent); }
  .masthead-meta { text-align:right; font-family:'JetBrains Mono', monospace; font-size:0.72rem; color:var(--muted); line-height:1.7; }
  .toolbar { padding: 12px 40px; border-bottom: 1px solid var(--border); background: var(--cream); display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:10; }
  .btn-fetch { font-family:'JetBrains Mono', monospace; font-size:0.75rem; font-weight:600; background: var(--ink); color: var(--paper); border:none; padding:8px 20px; cursor:pointer; transition: background 0.15s; }
  .btn-fetch:hover { background: var(--accent); }
  .btn-fetch:disabled { background: var(--border); cursor:not-allowed; }
  .key-input-wrap { display:flex; align-items:center; gap:8px; flex:1; max-width:420px; }
  .key-input { font-family:'JetBrains Mono', monospace; font-size:0.7rem; border: 1px solid var(--border); background: var(--paper); padding:6px 10px; flex:1; outline:none; }
  .status-bar { font-family:'JetBrains Mono', monospace; font-size:0.65rem; color:var(--muted); margin-left:auto; }
  .layout { display:grid; grid-template-columns: 1fr 340px; min-height: calc(100vh - 120px); position:relative; z-index:1; }
  .main-col { padding: 28px 36px; border-right:1px solid var(--border); }
  .side-col { padding:24px 24px; }
  .section-header { display:flex; align-items:baseline; justify-content:space-between; border-bottom: 2px solid var(--ink); padding-bottom:8px; margin-bottom:20px; }
  .section-title { font-family:'Playfair Display', serif; font-size:1.1rem; font-weight:700; letter-spacing:0.5px; }
  .topic-card { padding: 16px 0; border-bottom: 1px solid rgba(180,160,120,0.3); display:grid; grid-template-columns: 36px 1fr; gap:12px; animation: fadeIn 0.3s ease both; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .card-rank { font-family:'Playfair Display', serif; font-size:1.4rem; font-weight:900; color:var(--border); line-height:1; }
  .card-title a { color:inherit; text-decoration:none; font-weight:600; font-size:1.1rem;}
  .card-title a:hover { color:var(--accent); }
  .card-angles { display:flex; flex-direction:column; gap:5px; margin-top:8px;}
  .angle-item { display:flex; align-items:flex-start; gap:8px; font-size:0.85rem; line-height:1.6; color:var(--ink); margin-top:5px; }
  .angle-num { font-family:'JetBrains Mono', monospace; font-size:0.6rem; color:var(--paper); background: var(--muted); padding:1px 5px; margin-top:3px; flex-shrink:0; }
  .raw-platform-header { font-family:'JetBrains Mono', monospace; font-size:0.6rem; font-weight:600; color:var(--paper); background:var(--ink); padding:3px 8px; margin:15px 0 5px; }
  .raw-item { display:flex; align-items:baseline; gap:10px; padding:6px 0; border-bottom:1px solid rgba(0,0,0,0.05); font-size:0.75rem; }
  .raw-rank { font-family:'JetBrains Mono', monospace; font-size:0.62rem; color:var(--border); width:18px; flex-shrink:0; }
  .raw-title { color:var(--ink); flex:1; text-decoration:none; }
  .raw-title:hover { color:var(--accent); text-decoration:underline; }
  .free-write-section { border-top:3px double var(--ink); padding:40px 36px; background:var(--cream); position:relative; z-index:1; }
  .free-write-grid { display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:16px; }
  .free-write-full { grid-column:1/-1; }
  .field-label { font-family:'JetBrains Mono', monospace; font-size:0.65rem; color:var(--muted); margin-bottom:8px; display:block; text-transform:uppercase; letter-spacing:1px; }
  .draft-overlay { position:fixed; inset:0; background:rgba(26,18,8,0.95); z-index:100; display:none; align-items:center; justify-content:center; padding:24px; }
  .draft-overlay.open { display:flex; }
  .draft-box { background:var(--paper); width:100%; max-width:850px; max-height:92vh; display:flex; flex-direction:column; border:2px solid var(--ink); box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
  .draft-header { padding:16px 24px; border-bottom:2px solid var(--ink); display:flex; align-items:center; justify-content:space-between; background:var(--paper); }
  .draft-body { padding:30px; overflow-y:auto; flex:1; font-size:1.05rem; line-height:2.2; white-space:pre-wrap; font-family:'Noto Serif SC', serif;}
  .factcheck-report { padding:20px; border-top:1px solid var(--border); background:var(--cream); font-size:0.8rem; display:none; max-height:300px; overflow-y:auto; }
  .fact-item { margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid rgba(0,0,0,0.1); }
  .fact-original { color:var(--accent); text-decoration:line-through; margin-bottom:6px; font-size:0.85rem;}
  .fact-corrected { color:var(--green); font-weight:600; margin-bottom:6px; font-size:0.85rem;}
  .fact-link { color:var(--blue); text-decoration:none; font-size:0.8rem; display:inline-block; margin-top:2px; background: rgba(26,58,122,0.05); padding:2px 6px; border-radius:3px; }
  .fact-link:hover { background: rgba(26,58,122,0.1); text-decoration:underline; }
  .fact-ok { color:var(--green); font-size:0.85rem; margin-bottom:8px;}
  .citation-link { color:var(--blue); text-decoration:none; font-size:0.75rem; vertical-align:super; font-family:monospace; margin:0 2px; font-weight:bold;}
  .citation-link:hover { text-decoration:underline; }
  .cat-btn { font-family:'JetBrains Mono', monospace; font-size:0.62rem; font-weight:600; padding:5px 15px; cursor:pointer; border:1px solid var(--border); background:transparent; transition:all 0.2s;}
  .cat-btn.active { background:var(--ink); color:var(--paper); }
  .write-num { font-family:'JetBrains Mono', monospace; font-size:0.8rem; border:1px solid var(--border); padding:10px; background:var(--paper); outline:none; width:100%;}
  .btn-revise { background: var(--green); color: white; border: none; padding: 6px 15px; font-family: monospace; font-weight: 700; cursor: pointer; display: none; }
  .btn-revise.active { display: inline-block; animation: pulse 2s infinite; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
</style>
</head>
<body>

<div class="masthead">
  <div><div class="masthead-title">时评<span>雷达</span></div><div class="masthead-sub">RAG-Powered Commentary Tool</div></div>
  <div style="font-family:monospace; font-size:0.7rem;" id="clockDisplay"></div>
</div>

<div class="toolbar">
  <button class="btn-fetch" id="btnFetch" onclick="startAnalysis()">▶ 抓取并分析热榜</button>
  <div style="display:flex;gap:6px;">
    <button class="cat-btn" id="providerClaude" onclick="switchProvider('claude')">Claude</button>
    <button class="cat-btn" id="providerDeepseek" onclick="switchProvider('deepseek')">DeepSeek</button>
    <button class="cat-btn" id="providerGemini" onclick="switchProvider('gemini')">Gemini</button>
  </div>
  <div class="key-input-wrap">
    <label id="keyLabel" style="font-size:0.6rem; color:var(--muted)">KEY</label>
    <input class="key-input" id="claudeKey" type="password" oninput="saveKey(this.value)" placeholder="输入 API Key...">
  </div>
  <div class="status-bar" id="statusBar">就绪</div>
</div>

<div class="layout">
  <div class="main-col">
    <div class="section-header">
      <div class="section-title">今日推荐选题</div>
      <div id="resultCount" style="font-family:monospace; font-size:0.7rem; color:var(--muted)">-- SELECTIONS</div>
    </div>
    <div id="resultList">
        <div style="padding:100px 0; text-align:center; color:var(--muted)">点击“抓取并分析热榜”获取今日高价值选题</div>
    </div>
  </div>
  <div class="side-col">
    <div class="side-title" style="font-size:0.7rem; letter-spacing:1px; text-transform:uppercase; border-bottom:1px solid var(--border); padding-bottom:5px; margin-bottom:10px;">全网实时榜单 <span id="statTotal" style="color:var(--accent)"></span></div>
    <div class="raw-list" id="rawList"></div>
  </div>
</div>

<div class="free-write-section">
    <div class="section-title">自由创作中心</div>
    <div class="free-write-grid">
        <div class="free-write-full">
            <label class="field-label">选题标题 / 核心事件</label>
            <input class="write-num" id="freeTitle" placeholder="在此输入你想探讨的话题...">
        </div>
        <div>
            <label class="field-label">文章模式</label>
            <select id="freeStyle" class="write-num">
                <option value="fact_first">新闻实录 (事实优先/70%叙事)</option>
                <option value="pipeline">硬核六段式 (社会评论)</option>
                <option value="oped">深度 Op-Ed (反共识视角)</option>
            </select>
        </div>
        <div>
            <label class="field-label">写作立场</label>
            <select id="freePersona" class="write-num">
                <option value="reporter">冷峻记者 (客观叙事)</option>
                <option value="editor">主流情绪 (公约数视角)</option>
                <option value="radical">激进派 (批判既得利益)</option>
            </select>
        </div>
        <div>
            <label class="field-label">目标字数</label>
            <input type="number" id="freeWordcount" class="write-num" value="1000" step="500" min="500" max="3000">
        </div>
        <div>
            <label class="field-label">参考链接 (可选，用于抓取事实)</label>
            <input type="text" id="freeUrl" class="write-num" placeholder="粘贴新闻网页链接...">
        </div>
        <div class="free-write-full">
            <label class="field-label">核心观点 / 补充细节</label>
            <textarea id="freeAngle" class="write-num" style="height:80px; font-family:serif;" placeholder="描述你的切入视角或事实细节..."></textarea>
        </div>
        <div class="free-write-full" style="text-align:right;">
            <button class="btn-fetch" onclick="submitFreeWrite()">▶ 开始深度创作</button>
        </div>
    </div>
</div>

<div id="writeDialog" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; align-items:center; justify-content:center;">
    <div style="background:var(--paper); width:90%; max-width:600px; padding:35px; border:2px solid var(--ink); position:relative;">
        <div id="dialogTitle" style="font-weight:900; font-size:1.2rem; margin-bottom:20px; line-height:1.4"></div>
        <div style="font-family:monospace; font-size:0.65rem; color:var(--muted); margin-bottom:8px">选择写作角度 (可多选)</div>
        <div id="dialogAngles" style="margin-bottom:20px; background:var(--cream); padding:15px; border:1px solid var(--border); max-height:220px; overflow-y:auto;"></div>
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:25px;">
            <div>
                <label style="font-size:0.65rem; color:var(--muted); display:block; margin-bottom:5px">文章模式</label>
                <select id="diagStyle" class="write-num">
                    <option value="fact_first">新闻实录 (事实优先)</option>
                    <option value="pipeline">硬核六段式结构</option>
                    <option value="oped">深度 Op-Ed</option>
                </select>
            </div>
            <div>
                <label style="font-size:0.65rem; color:var(--muted); display:block; margin-bottom:5px">写作立场</label>
                <select id="diagPersona" class="write-num">
                    <option value="reporter">冷峻记者</option>
                    <option value="editor">主流情绪</option>
                    <option value="radical">激进派</option>
                </select>
            </div>
            <div>
                <label style="font-size:0.65rem; color:var(--muted); display:block; margin-bottom:5px">目标字数</label>
                <input type="number" id="diagWordcount" class="write-num" value="1000" step="500" min="500" max="3000">
            </div>
        </div>
        <div style="text-align:right">
            <button onclick="closeWriteDialog()" style="background:none; border:none; margin-right:15px; cursor:pointer; font-family:monospace">CANCEL</button>
            <button class="btn-fetch" onclick="submitFromDialog()">START WRITING</button>
        </div>
    </div>
</div>

<div class="draft-overlay" id="draftOverlay">
    <div class="draft-box">
        <div class="draft-header">
            <div id="draftTitle" style="font-weight:700; font-size:1.1rem"></div>
            <button onclick="closeDraft()" style="cursor:pointer; background:none; border:none; font-size:1.2rem">✕</button>
        </div>
        
        <div class="draft-body" id="draftBody"></div>
        
        <div class="factcheck-report" id="factcheckReport">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center">
                <div style="font-family:monospace; font-size:0.6rem; color:var(--muted);">FACT-CHECK REPORT</div>
                <button id="btnRevise" class="btn-revise" onclick="applyRevisions()">⚡ 应用修订并添加角标</button>
            </div>
            <div id="factcheckItems"></div>
        </div>
        
        <div style="padding:15px 25px; text-align:right; background:var(--cream); border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <div id="wordCount" style="font-family:monospace; font-size:0.7rem; color:var(--muted)"></div>
            <div style="display:flex; gap:10px;">
                <button id="btnFactcheck" class="cat-btn" onclick="startFactcheck()" disabled style="border-color:var(--green); color:var(--green); padding:8px 15px; font-size:0.7rem">🔍 核查事实与链接溯源</button>
                <button class="btn-fetch" onclick="copyDraft()" style="padding:8px 20px;">复制纯文本正文</button>
            </div>
        </div>
    </div>
</div>

<script>
window._topicData = {};
window._pendingCorrections = [];

function updateClock() { document.getElementById('clockDisplay').textContent = new Date().toLocaleString(); }
setInterval(updateClock, 1000); updateClock();

function getProvider() { return localStorage.getItem('ai_provider') || 'claude'; }
function saveKey(v) { localStorage.setItem(getProvider() + '_key', v); }

function switchProvider(p) {
    localStorage.setItem('ai_provider', p);
    document.querySelectorAll('.toolbar .cat-btn').forEach(b => b.classList.toggle('active', b.id.toLowerCase() === 'provider' + p));
    document.getElementById('keyLabel').textContent = p.toUpperCase() + ' KEY';
    document.getElementById('claudeKey').value = localStorage.getItem(p + '_key') || '';
}

async function callClaude(apiKey, prompt, maxTokens) {
    const provider = getProvider();
    let model = 'claude-3-5-sonnet-latest';
    if (provider === 'deepseek') model = 'deepseek-chat';
    if (provider === 'gemini') model = 'gemini-1.5-flash-latest';

    const res = await fetch('/api/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apiKey, provider, payload: { model, max_tokens: maxTokens || 4000, messages: [{ role: 'user', content: prompt }] } })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'API 请求失败');
    return data.content?.[0]?.text || '';
}

async function startAnalysis() {
    const key = localStorage.getItem(getProvider() + '_key');
    if (!key) return alert('请填入 API Key');
    document.getElementById('statusBar').textContent = '正在聚合全网热榜并筛选...';
    try {
        const SOURCES = [ {key:'toutiao',name:'今日头条'}, {key:'thepaper',name:'澎湃新闻'}, {key:'huxiu',name:'虎嗅'}, {key:'36kr',name:'36氪'}, {key:'sina-news',name:'新浪新闻'}, {key:'netease-news',name:'网易新闻'} ];
        const results = await Promise.all(SOURCES.map(s => fetch(`https://daily-hot-api-vercel-mu.vercel.app/${s.key}`).then(r => r.json()).catch(()=>({data:[]}))));
        const allItems = results.flatMap((r, i) => (r.data || []).map(item => ({...item, _sourceName: SOURCES[i].name})));
        
        const groups = {};
        allItems.forEach(it => { if(!groups[it._sourceName]) groups[it._sourceName]=[]; groups[it._sourceName].push(it); });
        document.getElementById('rawList').innerHTML = Object.entries(groups).map(([name, list]) => `<div class="raw-platform-header">${name}</div>` + list.slice(0,15).map((it, i) => `<div class="raw-item"><span style="color:var(--muted);width:20px">${i+1}</span><a href="${it.url}" target="_blank" style="color:inherit; text-decoration:none">${it.title}</a></div>`).join('')).join('');
        document.getElementById('statTotal').textContent = allItems.length + '条';

        const titles = allItems.slice(0, 100).map((it, i) => `${i+1}. [${it._sourceName}] ${it.title}`).join('\n');
        const prompt = `请从以下榜单筛选出 20 个最适合写深度评论或新闻实录的话题。返回JSON格式: {"selected": [{"index":序号, "angles":["深度视角1", "深度视角2"]}]}\n列表：\n${titles}`;
        
        const text = await callClaude(key, prompt, 4000);
        const analysis = JSON.parse(text.replace(/```json|```/g, '').trim());
        
        document.getElementById('resultList').innerHTML = analysis.selected.map((s, i) => {
            const item = allItems[s.index-1];
            if(!item) return '';
            window._topicData[i] = { title: item.title, angles: s.angles, url: item.url, sourceName: item._sourceName };
            return `<div class="topic-card">
                <div class="card-rank">${String(i+1).padStart(2,'0')}</div>
                <div class="card-body">
                    <div class="card-title"><a href="${item.url}" target="_blank">${item.title}</a></div>
                    <div class="card-angles">${s.angles.map(a => `<div class="angle-item"><span class="angle-num">视角</span>${a}</div>`).join('')}</div>
                    <button class="cat-btn" onclick="openWriteDialog(${i})" style="margin-top:12px; border-color:var(--gold); color:var(--gold)">✍ 写这篇</button>
                </div>
            </div>`;
        }).join('');
        document.getElementById('statusBar').textContent = '就绪';
        document.getElementById('resultCount').textContent = analysis.selected.length + ' SELECTIONS';
    } catch(e) { alert(e.message); document.getElementById('statusBar').textContent = '分析失败'; }
}

function openWriteDialog(idx) {
    const data = window._topicData[idx];
    if(!data) return alert('数据加载失败');
    window._currentIdx = idx;
    document.getElementById('dialogTitle').textContent = data.title;
    
    let html = data.angles.map((a, i) => 
        `<label style="display:block; margin-bottom:10px; cursor:pointer; font-size:0.9rem"><input type="checkbox" name="angleCheck" value="${i}" ${i===0?'checked':''}> ${a}</label>`
    ).join('');
    html += `<label style="display:block; margin-bottom:10px; cursor:pointer; font-size:0.9rem"><input type="checkbox" id="customAngleToggle"> 自定义补充视角...</label>`;
    html += `<input type="text" id="customAngleInput" class="write-num" style="display:none; width:100%; margin-bottom:10px" placeholder="输入要补充的视角，将与上方勾选项融合...">`;
    
    document.getElementById('dialogAngles').innerHTML = html;
    
    document.getElementById('customAngleToggle').onchange = function() {
        document.getElementById('customAngleInput').style.display = this.checked ? 'block' : 'none';
    };
    
    document.getElementById('writeDialog').style.display = 'flex';
}

function closeWriteDialog() { document.getElementById('writeDialog').style.display = 'none'; }

async function submitFromDialog() {
    const data = window._topicData[window._currentIdx];
    
    let selectedAngles = [];
    document.querySelectorAll('input[name="angleCheck"]:checked').forEach(cb => {
        selectedAngles.push(data.angles[cb.value]);
    });
    if(document.getElementById('customAngleToggle').checked) {
        const customVal = document.getElementById('customAngleInput').value.trim();
        if(customVal) selectedAngles.push(customVal);
    }
    if(selectedAngles.length === 0) return alert('请至少勾选或填写一个写作视角！');
    
    const combinedAngle = selectedAngles.join('；同时融合：');
    const style = document.getElementById('diagStyle').value;
    const persona = document.getElementById('diagPersona').value;
    const wordcount = document.getElementById('diagWordcount').value;

    closeWriteDialog();
    executeWorkflow(data.title, combinedAngle, style, persona, wordcount, data.url, data.sourceName);
}

function submitFreeWrite() {
    const t = document.getElementById('freeTitle').value.trim(); 
    const a = document.getElementById('freeAngle').value.trim();
    if(!t || !a) return alert('请填入标题和论点');
    
    const style = document.getElementById('freeStyle').value;
    const persona = document.getElementById('freePersona').value;
    const wordcount = document.getElementById('freeWordcount').value;
    const url = document.getElementById('freeUrl').value.trim();

    executeWorkflow(t, a, style, persona, wordcount, url, '外部链接');
}

async function executeWorkflow(title, angle, style, persona, wordcount, url, sourceName) {
    const overlay = document.getElementById('draftOverlay');
    overlay.classList.add('open');
    document.getElementById('draftTitle').textContent = title;
    const body = document.getElementById('draftBody');
    document.getElementById('factcheckReport').style.display = 'none';
    document.getElementById('btnFactcheck').disabled = true;
    document.getElementById('btnRevise').classList.remove('active');
    window._pendingCorrections = [];

    let sourceContent = "无法获取外部网页原文，请依赖模型内部知识库进行背景分析。";
    
    if (url && url.startsWith('http')) {
        try {
            body.innerHTML = `<div style="text-align:center; padding:50px; font-family:monospace; color:var(--gold)">PHASE 1: 正在跨域读取原始新闻网页素材...<br><span style="font-size:0.7rem; color:var(--muted)">目标源: ${sourceName || '未知'}</span></div>`;
            const jinaRes = await fetch('https://r.jina.ai/' + url);
            if (jinaRes.ok) {
                const rawText = await jinaRes.text();
                sourceContent = rawText.substring(0, 4000); 
            }
        } catch(e) {
            console.warn("Jina 抓取失败", e);
        }
    } else {
        body.innerHTML = '<div style="text-align:center; padding:50px; font-family:monospace; color:var(--gold)">PHASE 1: 未提供链接，正在基于内部知识库检索事实...</div>';
    }

    try {
        const key = localStorage.getItem(getProvider() + '_key');
        
        let researchPrompt = `你是一位深度调查记者。针对选题【${title}】和视角【${angle}】，请基于以下提供的【原始参考素材】提取最鲜活的新闻细节。`;
        
        if (sourceName === '今日头条') {
            researchPrompt += `\n注意：该素材可能来自话题聚合页，请提取涉及的多方观点、最新进展和核心事实清单。`;
        } else {
            researchPrompt += `\n注意：请重点提取文章中的 5W1H 事实清单、场景还原和核心数据。`;
        }
        
        researchPrompt += `\n【原始参考素材】：\n${sourceContent}\n\n严禁主观评价，只列客观事实，字数500字内。`;
        
        const research = await callClaude(key, researchPrompt, 1500);
        body.innerHTML = '<div style="text-align:center; padding:50px; font-family:monospace; color:var(--green)">PHASE 2: 网页事实已结构化完毕，正在进行深度排版创作...</div>';
        
        const personasDesc = {
            reporter: "冷峻的特稿记者 (白描手法，拒绝情绪词汇)",
            editor: "主流情绪观察员",
            radical: "激进派 (打破既得利益结构)"
        };
        
        let prompt = `你是【${personasDesc[persona]}】。基于以下【深度素材】写一篇约${wordcount}字文章。
【深度素材】${research}
【选题】${title} | 【多维融合视角】${angle}

【重要指令】：
1. 请务必在正文最开头，提供 3 个具有吸引力且侧重点不同的文章备选标题（格式为：【备选标题一】... 【备选标题二】... 【备选标题三】...），然后再开始正文内容。
2. 严禁使用 Markdown 加粗符号（**）。禁止使用“让人痛心”、“我们要...”等公文套话。`;

        if(style === 'fact_first') {
            prompt += "\n模式：新闻实录。请将 70% 的篇幅用于复述素材中的事实细节，分析应点到为止或放在文末。";
        } else if(style === 'pipeline') {
            prompt += "\n结构：特写破题、逻辑拆解、利益关联、金句定调、溯源追问、升华结尾。";
        } else if(style === 'oped') {
            prompt += "\n模式：深度 Op-Ed。反共识视角，使用学术/行业硬核术语实现智识压制，流体思维自然展开。";
        }

        const raw = await callClaude(key, prompt, 4000);
        const cleaned = raw.replace(/\*\*/g, '');
        
        body.innerHTML = cleaned.replace(/\n/g, '<br>');
        document.getElementById('wordCount').textContent = cleaned.length + ' 字符';
        document.getElementById('btnFactcheck').disabled = false;
    } catch(e) { body.innerHTML = `<div style="color:var(--accent)">生成失败: ${e.message}</div>`; }
}

async function startFactcheck() {
    const itemsEl = document.getElementById('factcheckItems');
    document.getElementById('factcheckReport').style.display = 'block';
    document.getElementById('btnRevise').classList.remove('active');
    window._pendingCorrections = []; 
    
    itemsEl.innerHTML = '<div style="font-family:monospace; color:var(--gold)">正在提取事实，并生成可靠的新闻搜索锚点...</div>';
    
    try {
        const key = localStorage.getItem(getProvider() + '_key');
        
        const prompt = `你是一个极度严苛的事实核查机器。请核查以下评论文章的事实真实性。
【关键指令】：不要试图生成任何新闻的URL链接！因为你无法联网验证，会导致死链。
【操作方式】：请提取可以用于搜索引擎验证的“极简搜索词”。
“极简搜索词”必须且仅能包含2-3个核心名词（例如：“网暴 检察日报”或“统计局 失业率”）。绝对不能包含具体的长标题、日期或标点符号！

严格按以下格式输出（使用|分割）：
ERROR|原文错误表述|正确的事实描述|发现错误的原因|极简搜索词
OK|已核实的事实描述|极简搜索词

文章内容：\n${document.getElementById('draftBody').innerText}`;
        
        const report = await callClaude(key, prompt, 3000);
        const lines = report.split('\n').filter(l => l.trim() && (l.startsWith('ERROR|') || l.startsWith('OK|')));
        
        if (lines.length === 0) {
            itemsEl.innerHTML = `<div style="color:var(--muted)">未按规范格式返回数据，原始内容：<br>${report}</div>`;
            return;
        }

        let html = '';
        lines.forEach((line, index) => {
            const p = line.split('|');
            if(line.startsWith('ERROR|')) {
                const searchKeyword = p[4] || p[1];
                const realSearchLink = `https://www.baidu.com/s?wd=${encodeURIComponent(searchKeyword)}`;
                
                window._pendingCorrections.push({ original: p[1], corrected: p[2], sourceLink: realSearchLink, id: index });
                
                html += `<div class="fact-item">
                    <div class="fact-original">✗ 错误：${p[1]}</div>
                    <div class="fact-corrected">✓ 应为：${p[2]}</div>
                    <a class="fact-link" href="${realSearchLink}" target="_blank">🔍 前往百度搜索核实：${searchKeyword}</a>
                </div>`;
            } else if (line.startsWith('OK|')) {
                const searchKeyword = p[2] || p[1];
                const realSearchLink = `https://www.baidu.com/s?wd=${encodeURIComponent(searchKeyword)}`;
                
                html += `<div class="fact-ok">
                    ✓ 核实：${p[1]}
                    <br><a class="fact-link" href="${realSearchLink}" target="_blank" style="margin-top:5px; margin-bottom:10px">🔍 前往百度搜索验证：${searchKeyword}</a>
                </div>`;
            }
        });
        
        itemsEl.innerHTML = html;
        if (window._pendingCorrections.length > 0) document.getElementById('btnRevise').classList.add('active');
        
    } catch(e) { itemsEl.innerHTML = `<div style="color:var(--accent)">核查异常: ${e.message}</div>`; }
}

async function applyRevisions() {
    if (window._pendingCorrections.length === 0) return;
    
    const btn = document.getElementById('btnRevise');
    btn.textContent = '⚡ 正在替换错误并嵌入来源角标...';
    btn.classList.remove('active');
    
    const key = localStorage.getItem(getProvider() + '_key');
    const originalText = document.getElementById('draftBody').innerText;
    
    const correctionRules = window._pendingCorrections.map((c, i) => 
        `规则 ${i+1}: 将错误描述 "${c.original}" 替换为 "${c.corrected}"，并在其后紧贴插入HTML角标：<a class="citation-link" href="${c.sourceLink}" target="_blank" title="点击搜索验证">[${i+1}]</a>`
    ).join('\n');

    const prompt = `你是排版编辑。根据规则修改原文。只输出修改后的全文（包含插入的HTML角标），绝对不要使用**加粗，保留换行。
规则：\n${correctionRules}\n\n原文：\n${originalText}`;

    try {
        const revisedRaw = await callClaude(key, prompt, 4000);
        const cleaned = revisedRaw.replace(/\*\*/g, '');
        document.getElementById('draftBody').innerHTML = cleaned.replace(/\n/g, '<br>');
        btn.textContent = '✓ 自动修订已完成';
        btn.style.background = 'var(--border)';
    } catch(e) {
        alert('修订失败: ' + e.message);
        btn.textContent = '⚡ 应用修订并添加角标';
        btn.classList.add('active');
    }
}

function closeDraft() { document.getElementById('draftOverlay').classList.remove('open'); }
function copyDraft() { navigator.clipboard.writeText(document.getElementById('draftBody').innerText); alert('已复制纯文本内容'); }
window.onload = () => switchProvider(getProvider());
</script>
